    <g stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Shield -->
      <path d="M144 8 L264 52 V156 C264 230 208 288 144 312 C80 288 24 230 24 156 V52 Z"/>

      <!-- Castle -->
      <path d="M88 206 V126"/>
      <path d="M144 206 V108"/>
      <path d="M200 206 V126"/>

      <!-- Battlements -->
      <path d="M76 126 H100"/>
      <path d="M132 108 H156"/>
      <path d="M188 126 H212"/>

      <!-- Base -->
      <path d="M72 206 H216"/>

      <!-- Door -->
      <path d="M128 206 V176 C128 166 136 158 144 158 C152 158 160 166 160 176 V206"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="360" y="210" fill="currentColor" font-size="148" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="700" letter-spacing="1">Citadel</text>
</svg>
