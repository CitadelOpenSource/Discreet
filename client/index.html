<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Discreet</title>
  <meta name="description" content="Zero-knowledge encrypted community chat" />
  <meta name="application-name" content="Discreet" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Discreet" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0f1c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="msapplication-TileColor" content="#0a0f1c" />
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  <script>
  (function(){
    var t=localStorage.getItem('discreet-theme-preference');
    if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'midnight':'daylight';
    document.documentElement.setAttribute('data-theme',t);
    var bg=t==='daylight'?'#F5F3F0':'#07090f';
    document.documentElement.style.background=bg;
  })();
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { max-width:100vw; overflow-x:hidden; }
    body { background:#07090f; color:#e0e4ea; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; overflow-y:auto; overflow-x:hidden; height:100dvh; }
    #root { height:100%; }
    /* Loading spinner */
    .loading-screen { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:16px; }
    .loading-screen .spinner { width:32px; height:32px; border:3px solid #1a1d2e; border-top:3px solid #7C3AED; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div style="font-size:14px;color:#666b7a;">Loading Discreet...</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
