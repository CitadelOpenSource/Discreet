            <div onClick={()=>setCreateChType("voice")} style={{ flex:1, padding:"10px 12px", borderRadius:8, cursor:"pointer", border:`2px solid ${createChType==="voice"?T.ac:T.bd}`, background:createChType==="voice"?"rgba(0,212,170,0.06)":"transparent", textAlign:"center" }}>
              <I.Vol />
              <div style={{ fontSize:12, fontWeight:600, marginTop:4, color:createChType==="voice"?T.ac:T.tx }}>Voice</div>
            </div>
            <div onClick={()=>setCreateChType("forum")} style={{ flex:1, padding:"10px 12px", borderRadius:8, cursor:"pointer", border:`2px solid ${createChType==="forum"?T.ac:T.bd}`, background:createChType==="forum"?"rgba(0,212,170,0.06)":"transparent", textAlign:"center" }}>
              <I.Msg />
              <div style={{ fontSize:12, fontWeight:600, marginTop:4, color:createChType==="forum"?T.ac:T.tx }}>Forum</div>
            </div>
          </div>
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase" }}>Channel Name</label>
          <input style={{...getInp(),marginBottom:16}} value={createName} onChange={e=>setCreateName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleCreateCh()} placeholder={createChType==="voice"?"voice-chat":createChType==="forum"?"discussions":"general"} autoFocus />
          <button onClick={handleCreateCh} style={btn(!!createName.trim())}>Create {createChType==="voice"?"Voice":createChType==="forum"?"Forum":"Text"} Channel</button>
        </Modal>
      )}

      {modal==="join-server"&&(
        <Modal title="Join a Server" onClose={()=>setModal(null)}>
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase" }}>Server ID</label>
          <input style={{...getInp(),marginBottom:14}} value={joinSid} onChange={e=>setJoinSid(e.target.value)} placeholder="paste server ID here" autoFocus />
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase" }}>Invite Code</label>
          <input style={{...getInp(),marginBottom:16}} value={joinCode} onChange={e=>setJoinCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleJoin()} placeholder="paste invite code here" />
          <button onClick={handleJoin} style={btn(!!joinCode.trim()&&!!joinSid.trim())}>Join Server</button>
        </Modal>
      )}


      {/* Context menu overlay */}
      {ctxMenu && <CtxMenu x={ctxMenu.x} y={ctxMenu.y} items={ctxMenu.items} onClose={()=>setCtxMenu(null)} />}

      {/* Invite code modal */}
      {modal?.type==="invite" && (
        <Modal title="Server Invite" onClose={()=>setModal(null)}>
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, fontWeight:600, color:T.mt, textTransform:"uppercase", marginBottom:8 }}>Invite Code</div>
            <div style={{ display:"flex", gap:8 }}>
              <input readOnly value={modal.data?.code||modal.data?.invite_code||""} style={{ ...getInp(), flex:1, fontSize:18, fontFamily:"'JetBrains Mono',monospace", fontWeight:700, color:T.ac, textAlign:"center" }} />
              <button onClick={()=>{navigator.clipboard?.writeText(modal.data?.code||modal.data?.invite_code||"");}} className="pill-btn" style={{ background:T.ac, color:"#000" }}>Copy</button>
            </div>
          </div>
          <div style={{ fontSize:12, color:T.mt }}>Share this code with people to join your server.</div>
        </Modal>
      )}

      {modal?.type==="meeting-created" && (
        <Modal title="Meeting Created" onClose={()=>setModal(null)}>
          <div style={{ textAlign:"center", padding:12 }}>
            <div style={{ fontSize:48, marginBottom:12 }}>📹</div>
            <div style={{ fontSize:14, fontWeight:600, color:T.tx, marginBottom:4 }}>{modal.data?.title||"Meeting"}</div>
            <div style={{ fontSize:11, color:T.mt, marginBottom:16 }}>Share this code to invite others</div>
            <div style={{ fontSize:36, fontWeight:700, fontFamily:"'JetBrains Mono',monospace", color:T.ac, letterSpacing:"6px", padding:"16px 0", background:T.bg, borderRadius:12, border:`1px solid ${T.bd}`, marginBottom:16 }}>{modal.data?.code}</div>
            <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
              <button onClick={()=>navigator.clipboard?.writeText(modal.data?.code||"")} className="pill-btn" style={{ background:T.ac, color:"#000", padding:"10px 24px", fontSize:14, fontWeight:700 }}>Copy Code</button>
              <button onClick={()=>navigator.clipboard?.writeText(`Join my encrypted meeting on Citadel!\nCode: ${modal.data?.code}\nhttps://citadel.chat/meet/${modal.data?.code}`)} className="pill-btn" style={{ background:T.sf2, color:T.tx, border:`1px solid ${T.bd}`, padding:"10px 24px", fontSize:14 }}>Copy Link</button>
            </div>
            <div style={{ fontSize:10, color:T.mt, marginTop:12 }}>{modal.data?.has_password?"🔒 Password protected":"🔓 Open meeting"} · Expires in 24 hours · E2EE</div>
          </div>
        </Modal>
      )}

      {/* Edit channel modal */}
      {modal?.type==="edit-channel" && (
        <Modal title={"Edit #"+(modal.channel?.name||"")} onClose={()=>setModal(null)} wide>
          <EditChannelModal channel={modal.channel} serverId={curServer?.id} allRoles={allRoles} onClose={()=>setModal(null)} onSave={()=>{api.listChannels(curServer.id).then(c=>{if(Array.isArray(c))setChannels(c);}); setModal(null);}} />
        </Modal>
      )}

      {modal==="server-settings"&&curServer&&(
        <ServerSettingsModal server={curServer} onClose={()=>setModal(null)} onUpdate={async()=>{
          const updated = await api.listServers();
          if(Array.isArray(updated)) {
            setServers(updated);
            const cur = updated.find(s=>s.id===curServer?.id);
            if(cur) setCurServer(cur);
          }
          await refreshAllRoles();
        }} />
      )}

      {/* Create channel inside a specific category */}
      {modal?.type==="create-channel-in-cat"&&(
        <Modal title={"New Channel in "+modal.catName} onClose={()=>setModal(null)}>
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase" }}>Channel Name</label>
          <input style={{...getInp(),marginBottom:16}} value={createName} onChange={e=>setCreateName(e.target.value)}
            onKeyDown={async e=>{if(e.key==="Enter"&&createName.trim()){await api.createChannel(curServer.id,createName.trim(),modal.catId,createChType);setCreateName("");setModal(null);api.listChannels(curServer.id).then(c=>{if(Array.isArray(c))setChannels(c);});}}}
            placeholder="channel-name" autoFocus />
          <div style={{ display:"flex", gap:8, marginBottom:14 }}>
            <div onClick={()=>setCreateChType("text")} style={{ flex:1, padding:"8px 12px", borderRadius:8, cursor:"pointer", border:`2px solid ${createChType==="text"?T.ac:T.bd}`, textAlign:"center", fontSize:12, fontWeight:600, color:createChType==="text"?T.ac:T.tx }}>Text</div>
            <div onClick={()=>setCreateChType("voice")} style={{ flex:1, padding:"8px 12px", borderRadius:8, cursor:"pointer", border:`2px solid ${createChType==="voice"?T.ac:T.bd}`, textAlign:"center", fontSize:12, fontWeight:600, color:createChType==="voice"?T.ac:T.tx }}>Voice</div>
          </div>
          <button onClick={async()=>{if(!createName.trim())return;await api.createChannel(curServer.id,createName.trim(),modal.catId,createChType);setCreateName("");setCreateChType("text");setModal(null);api.listChannels(curServer.id).then(c=>{if(Array.isArray(c))setChannels(c);});}} style={btn(!!createName.trim())}>Create Channel</button>
        </Modal>
      )}

      {/* Edit category name */}
      {modal?.type==="edit-category"&&(
        <Modal title={"Edit Category"} onClose={()=>setModal(null)}>
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase" }}>Category Name</label>
          <input defaultValue={modal.catName||""} id="edit-cat-name" style={{...getInp(),marginBottom:16}} autoFocus onKeyDown={async e=>{
            if(e.key==="Enter"){const n=e.target.value.trim();if(n){await api.fetch("/servers/"+curServer.id+"/categories/"+modal.catId,{method:"PATCH",body:JSON.stringify({name:n})});api.listChannels(curServer.id).then(c=>{if(Array.isArray(c))setChannels(c);});setModal(null);}}
          }} />
          <button onClick={async()=>{const n=document.getElementById("edit-cat-name")?.value?.trim();if(n){await api.fetch("/servers/"+curServer.id+"/categories/"+modal.catId,{method:"PATCH",body:JSON.stringify({name:n})});api.listChannels(curServer.id).then(c=>{if(Array.isArray(c))setChannels(c);});setModal(null);}}} style={btn(true)}>Save</button>
        </Modal>
      )}

      {/* Bot Configuration Modal */}
      {botConfig && <BotConfigModal bot={botConfig.bot} serverId={botConfig.serverId} onClose={()=>setBotConfig(null)} onSave={()=>{}} />}

      {/* Image Lightbox */}
      {/* ── Quick Switcher (Ctrl+K) ── */}
      {quickSwitcher && React.createElement(function QuickSwitcher() {
        const [q, setQ] = useState("");
        const inputRef = useRef(null);
        const [sel, setSel] = useState(0);
        useEffect(()=>{inputRef.current?.focus();},[]);

        const results = [];
        const ql = q.toLowerCase().trim();
        if(ql) {
          // Servers
          servers.filter(s=>s.name.toLowerCase().includes(ql)).slice(0,3).forEach(s=>{
            results.push({type:"server",id:s.id,name:s.name,icon:"🏰",fn:()=>{setCurServer(s);setQuickSwitcher(false);}});
          });
          // Channels in current server
          if(curServer) {
            channels.filter(c=>c.name.toLowerCase().includes(ql)).slice(0,5).forEach(c=>{
              results.push({type:"channel",id:c.id,name:"#"+c.name,icon:c.channel_type==="voice"?"🔊":"💬",sub:curServer.name,fn:()=>{if(c.channel_type==="voice")joinVoice(c);else setCurChannel(c);setQuickSwitcher(false);}});
            });
          }
          // DMs
          dms.filter(d=>(d.recipient_name||d.recipient_username||"").toLowerCase().includes(ql)).slice(0,3).forEach(d=>{
            results.push({type:"dm",id:d.id,name:d.recipient_name||d.recipient_username,icon:"📩",fn:()=>{selectDm(d);setQuickSwitcher(false);}});
          });
          // Members
          if(curServer) {
            members.filter(m=>(m.username||"").toLowerCase().includes(ql)||(m.display_name||"").toLowerCase().includes(ql)).slice(0,3).forEach(m=>{
              results.push({type:"member",id:m.user_id,name:m.display_name||m.username,icon:"👤",sub:curServer.name,fn:()=>{openProfile(m.user_id,{clientX:400,clientY:300,stopPropagation:()=>{}});setQuickSwitcher(false);}});
            });
          }
        }
        // Quick actions (always shown)
        if(!ql||"settings".includes(ql)) results.push({type:"action",id:"settings",name:"User Settings",icon:"⚙️",fn:()=>{setModal("settings");setQuickSwitcher(false);}});
        if(!ql||"create server".includes(ql)) results.push({type:"action",id:"create",name:"Create Server",icon:"➕",fn:()=>{setModal("create-server");setQuickSwitcher(false);}});

        const clampSel = Math.min(sel, results.length-1);

        return (
          <div style={{ position:"fixed", inset:0, zIndex:10002, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"flex-start", justifyContent:"center", paddingTop:"15vh" }} onClick={()=>setQuickSwitcher(false)}>
            <div style={{ width:480, maxWidth:"92vw", background:T.sf, borderRadius:12, border:`1px solid ${T.bd}`, boxShadow:"0 16px 48px rgba(0,0,0,0.5)", overflow:"hidden" }} onClick={e=>e.stopPropagation()}>
              <div style={{ padding:"14px 16px", borderBottom:`1px solid ${T.bd}` }}>
                <input ref={inputRef} value={q} onChange={e=>{setQ(e.target.value);setSel(0);}}
                  onKeyDown={e=>{
                    if(e.key==="ArrowDown") { e.preventDefault(); setSel(p=>Math.min(p+1,results.length-1)); }
                    if(e.key==="ArrowUp") { e.preventDefault(); setSel(p=>Math.max(p-1,0)); }
                    if(e.key==="Enter"&&results[clampSel]) results[clampSel].fn();
                    if(e.key==="Escape") setQuickSwitcher(false);
                  }}
                  placeholder="Where would you like to go? Type a server, channel, or user..."
                  style={{ width:"100%", background:"transparent", border:"none", color:T.tx, fontSize:16, outline:"none", fontFamily:"'DM Sans',sans-serif" }} />
              </div>
              <div style={{ maxHeight:320, overflowY:"auto", padding:8 }}>
                {results.length===0 && q && <div style={{ padding:"16px 12px", color:T.mt, fontSize:13, textAlign:"center" }}>No results for "{q}"</div>}
                {results.map((r,i)=>(
                  <div key={r.type+r.id} onClick={r.fn}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", borderRadius:6, cursor:"pointer", background:i===clampSel?"rgba(0,212,170,0.1)":"transparent", transition:"background .1s" }}
                    onMouseEnter={()=>setSel(i)}>
                    <span style={{ fontSize:18, width:28, textAlign:"center" }}>{r.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:600, color:i===clampSel?T.ac:T.tx }}>{r.name}</div>
                      {r.sub && <div style={{ fontSize:10, color:T.mt }}>{r.sub}</div>}
                    </div>
                    <span style={{ fontSize:10, color:T.mt, textTransform:"uppercase", fontWeight:600 }}>{r.type}</span>
                  </div>
                ))}
              </div>
              <div style={{ padding:"8px 16px", borderTop:`1px solid ${T.bd}`, display:"flex", justifyContent:"space-between", fontSize:10, color:T.mt }}>
                <span>↑↓ Navigate • Enter Select • Esc Close</span>
                <span style={{ fontFamily:"monospace", background:T.bg, padding:"1px 6px", borderRadius:3 }}>Ctrl+K</span>
              </div>
            </div>
          </div>
        );
      })}

      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{ position:"fixed", inset:0, zIndex:10000, background:"rgba(0,0,0,0.9)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"zoom-out" }}>
          <img src={lightbox.src} style={{ maxWidth:"95vw", maxHeight:"95vh", objectFit:"contain", borderRadius:4 }} onClick={e=>e.stopPropagation()} />
          <div onClick={()=>setLightbox(null)} style={{ position:"fixed", top:16, right:16, width:36, height:36, borderRadius:18, background:"rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:"#fff", fontSize:18, fontWeight:700 }}>✕</div>
          <div style={{ position:"fixed", bottom:16, display:"flex", gap:8 }}>
            <button onClick={(e)=>{e.stopPropagation();window.open(lightbox.src,"_blank","noopener");}} style={{ padding:"8px 16px", background:"rgba(255,255,255,0.1)", color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontSize:12 }}>Open Original</button>
            <button onClick={(e)=>{e.stopPropagation();const a=document.createElement("a");a.href=lightbox.src;a.download="image";a.click();}} style={{ padding:"8px 16px", background:"rgba(255,255,255,0.1)", color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontSize:12 }}>Download</button>
          </div>
        </div>
      )}

      {/* Confirm dialog (replaces browser confirm()) */}
      <ConfirmDialog dialog={confirmDialog} setDialog={setConfirmDialog} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
