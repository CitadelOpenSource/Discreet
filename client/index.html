// Context Menu (right-click) — used for servers, channels, messages
// ═══════════════════════════════════════════════════════════
function CtxMenu({ x, y, items, onClose }) {
  const ref = React.useRef(null);
  const [subOpen, setSubOpen] = useState(null); // index of open submenu
  React.useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const k = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("mousedown", h); document.addEventListener("keydown", k);
    document.addEventListener("touchstart", h);
    return () => { document.removeEventListener("mousedown", h); document.removeEventListener("keydown", k); document.removeEventListener("touchstart", h); };
  }, [onClose]);
  const mx = Math.min(x, window.innerWidth - 220);
  const my = Math.min(y, window.innerHeight - (items.length * 36 + 20));
  return ReactDOM.createPortal(
    <div ref={ref} style={{ position:"fixed", left:mx, top:my, zIndex:10001, minWidth:200, background:"#111320", borderRadius:8, border:"1px solid "+T.bd, padding:"5px 0", boxShadow:"0 8px 32px rgba(0,0,0,0.6)", fontFamily:"'DM Sans',sans-serif" }}>
      {items.map((it, i) => {
        if (it.sep) return <div key={i} style={{ height:1, background:T.bd, margin:"4px 8px" }} />;
        const hasSub = it.sub && it.sub.length > 0;
        return (<div key={i} style={{ position:"relative" }}>
          <div onClick={() => { if(hasSub){setSubOpen(subOpen===i?null:i);return;} if (!it.off) { it.fn?.(); onClose(); } }}
          onMouseEnter={e => { if(hasSub)setSubOpen(i); if (!it.off) e.currentTarget.style.background = it.danger ? "rgba(255,71,87,0.08)" : "rgba(255,255,255,0.06)"; }}
          onMouseLeave={e => { if(!hasSub)e.currentTarget.style.background = "transparent"; }}
          style={{ padding:"7px 12px", display:"flex", alignItems:"center", gap:9, fontSize:13, color:it.danger?"#ff4757":it.off?T.mt:T.tx, cursor:it.off?"default":"pointer", opacity:it.off?0.4:1, borderRadius:4, margin:"0 4px", transition:"background .1s", background:subOpen===i&&hasSub?"rgba(255,255,255,0.06)":"transparent" }}>
          {it.icon && <span style={{ display:"flex", alignItems:"center", width:20, color:it.danger?"#ff4757":T.mt }}>{it.icon}</span>}
          <span style={{ flex:1 }}>{it.label}</span>
          {hasSub && <span style={{ fontSize:10, color:T.mt }}>▸</span>}
          {it.hint && <span style={{ fontSize:10, color:T.mt, fontFamily:"'JetBrains Mono',monospace" }}>{it.hint}</span>}
        </div>
        {subOpen===i && hasSub && (
          <div style={{ position:"absolute", left:"100%", top:0, minWidth:180, background:"#111320", borderRadius:8, border:"1px solid "+T.bd, padding:"5px 0", boxShadow:"0 8px 32px rgba(0,0,0,0.6)", zIndex:10002 }}
            onMouseLeave={()=>setSubOpen(null)}>
            {it.sub.map((s,j) => (
              <div key={j} onClick={()=>{s.fn?.();onClose();}}
                style={{ padding:"7px 12px", fontSize:12, color:T.tx, cursor:"pointer", borderRadius:4, margin:"0 4px", display:"flex", alignItems:"center", gap:8 }}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.06)"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                {s.icon&&<span style={{display:"flex",alignItems:"center",width:16,color:T.mt}}>{s.icon}</span>}
                <span>{s.label}</span>
              </div>
            ))}
          </div>
        )}
        </div>);
      })}
    </div>,
    document.body
  );
}

// ═══════════════════════════════════════════════════════════
// Slash Command Suggestions
// ═══════════════════════════════════════════════════════════
function SlashSuggestions({ input, members, roles, onSet }) {
  if (!input.startsWith("/")) return null;
  const parts = input.split(" ");
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(" ").toLowerCase();
  const cmds = [
    { c:"/ban", d:"Ban a user", icon:"🔨" },
    { c:"/kick", d:"Kick a user", icon:"👢" },
    { c:"/role", d:"Assign role", icon:"🏷️" },
    { c:"/nick", d:"Set nickname", icon:"✏️" },
    { c:"/audit", d:"View audit log", icon:"📋" },
    { c:"/settings", d:"Server settings", icon:"⚙️" },
    { c:"/invite", d:"Create invite", icon:"🔗" },
    { c:"/pin", d:"Pin last message", icon:"📌" },
    { c:"/emoji", d:"Open emoji picker", icon:"😀" },
    { c:"/watch", d:"Watch YouTube together", icon:"📺" },
    { c:"/stopwatch", d:"End watch party", icon:"⏹" },
    { c:"/poll", d:"Create a poll", icon:"📊" },
    { c:"/meeting", d:"Start a meeting", icon:"📹" },
  ];
  const box = { position:"absolute", bottom:"100%", left:0, right:0, background:"#111320", borderRadius:"8px 8px 0 0", border:"1px solid "+T.bd, borderBottom:"none", padding:6, zIndex:50, maxHeight:240, overflowY:"auto" };
  const row = { display:"flex", alignItems:"center", gap:8, padding:"6px 8px", borderRadius:5, cursor:"pointer", fontSize:13, transition:"background .1s" };
  const hov = (e) => e.currentTarget.style.background = "rgba(255,255,255,0.05)";
  const uhov = (e) => e.currentTarget.style.background = "transparent";
  if (input === "/") return (
    <div style={box}>
      <div style={{ fontSize:11, fontWeight:700, color:T.mt, padding:"4px 8px", textTransform:"uppercase" }}>Commands</div>
      {cmds.map(c => (<div key={c.c} onClick={() => onSet(c.c + " ")} style={row} onMouseEnter={hov} onMouseLeave={uhov}>
        <span>{c.icon}</span>
        <span style={{ color:T.ac, fontWeight:600, fontFamily:"'JetBrains Mono',monospace" }}>{c.c}</span>
        <span style={{ color:T.mt, fontSize:12 }}>{c.d}</span>
      </div>))}
    </div>
  );
  if (["/ban","/kick","/role"].includes(cmd) && parts.length <= 2) {
    const f = (members||[]).filter(m => !arg || m.username?.toLowerCase().includes(arg));
    if (!f.length) return null;
    return (<div style={box}>
      <div style={{ fontSize:11, fontWeight:700, color:T.mt, padding:"4px 8px" }}>Select member:</div>
      {f.slice(0,8).map(m => (<div key={m.user_id} onClick={() => onSet(cmd+" "+m.username+" ")} style={row} onMouseEnter={hov} onMouseLeave={uhov}>
        <Av name={m.username||"?"} size={22} />
        <span style={{ color:T.tx }}>{m.username}</span>
      </div>))}
    </div>);
  }
  if (cmd === "/role" && parts.length >= 3) {
    const rArg = parts.slice(2).join(" ").toLowerCase();
    const f = (roles||[]).filter(r => !rArg || r.name?.toLowerCase().includes(rArg));
    return (<div style={box}>
      <div style={{ fontSize:11, fontWeight:700, color:T.mt, padding:"4px 8px" }}>Select role for {parts[1]}:</div>
      {f.map(r => (<div key={r.id} onClick={() => onSet("/role "+parts[1]+" "+r.name)} style={row} onMouseEnter={hov} onMouseLeave={uhov}>
        <div style={{ width:10, height:10, borderRadius:5, background:r.color||T.ac }} />
        <span style={{ color:r.color||T.tx }}>{r.name}</span>
      </div>))}
    </div>);
  }
  return null;
}


// ═══════════════════════════════════════════════════════════
// File Attachment Display — renders [file:uuid] as download buttons
// ═══════════════════════════════════════════════════════════
function FileAttachment({ fileId }) {
  const [info, setInfo] = React.useState(null);
  const [downloading, setDownloading] = React.useState(false);
  const [imgSrc, setImgSrc] = React.useState(null);
  const [expanded, setExpanded] = React.useState(false);
  React.useEffect(() => {
    if(!fileId) return;
    api.downloadFile(fileId).then(d=>{
      setInfo(d);
      // If it's an image, create an inline preview
      if(d?.encrypted_blob && d?.mime_type_hint?.startsWith("image/")) {
        try {
          const binary = atob(d.encrypted_blob.replace(/-/g,"+").replace(/_/g,"/"));
          const bytes = new Uint8Array(binary.length);
          for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
          const blob = new Blob([bytes], {type:d.mime_type_hint});
          setImgSrc(URL.createObjectURL(blob));
        } catch(e) { console.error("Image preview failed:",e); }
      }
    }).catch(()=>setInfo({error:true}));
  }, [fileId]);

  const handleDownload = async () => {
    if(!info?.encrypted_blob) return;
    setDownloading(true);
    try {
      const binary = atob(info.encrypted_blob.replace(/-/g,"+").replace(/_/g,"/"));
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
      const blob = new Blob([bytes], {type:info.mime_type_hint||"application/octet-stream"});
      const url = URL.createObjectURL(blob);
      const ext = (info.mime_type_hint||"").split("/")[1]||"bin";
      const fname = info.original_filename || `file-${fileId.slice(0,8)}.${ext}`;
      const a = document.createElement("a"); a.href=url; a.download=fname; a.click();
      URL.revokeObjectURL(url);
    } catch(e) { console.error("Download failed:",e); }
    setDownloading(false);
  };

  if(!info) return <span style={{color:T.mt,fontSize:12}}>Loading file...</span>;
  if(info.error) return <span style={{color:T.err,fontSize:12}}>File unavailable</span>;
  const sizeKB = info.size_bytes ? (info.size_bytes/1024).toFixed(1) : "?";
  const sizeMB = info.size_bytes > 1048576 ? (info.size_bytes/1048576).toFixed(1)+" MB" : sizeKB+" KB";
  const fname = info.original_filename || "Encrypted file";
  const isImage = imgSrc && info?.mime_type_hint?.startsWith("image/");
  const isAudio = info?.mime_type_hint?.startsWith("audio/") || fname?.endsWith(".webm") || fname?.endsWith(".ogg") || fname?.endsWith(".mp3");
  const isVoice = fname?.startsWith("voice-");

  return (
    <div style={{ marginTop:4, maxWidth:400 }}>
      {/* Inline image preview */}
      {isImage && (
        <div style={{ marginBottom:4, borderRadius:8, overflow:"hidden", border:`1px solid ${T.bd}`, cursor:"pointer", position:"relative" }}
          onClick={()=>setExpanded(!expanded)}>
          <img src={imgSrc} alt={fname} style={{ maxWidth:"100%", maxHeight:expanded?600:280, objectFit:"contain", display:"block", background:T.bg }} />
        </div>
      )}
      {/* Audio / Voice message player */}
      {isAudio && imgSrc && (
        <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px", background:T.sf2, border:`1px solid ${T.bd}`, borderRadius:10, marginBottom:4 }}>
          <span style={{ fontSize:18, flexShrink:0 }}>{isVoice ? "🎙️" : "🎵"}</span>
          <div style={{ flex:1, minWidth:0 }}>
            {isVoice && <div style={{ fontSize:11, fontWeight:600, color:T.ac, marginBottom:3 }}>Voice Message</div>}
            <audio controls preload="metadata" src={imgSrc} style={{ width:"100%", height:28 }} />
          </div>
        </div>
      )}
      {/* File info bar */}
      <div onClick={handleDownload} style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"6px 12px", background:T.sf2, border:`1px solid ${T.bd}`, borderRadius:8, cursor:"pointer", transition:"background .15s", maxWidth:"100%" }}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(0,212,170,0.06)"}
        onMouseLeave={e=>e.currentTarget.style.background=T.sf2}>
        <I.Paperclip />
        <div style={{ overflow:"hidden" }}>
          <div style={{ fontSize:13, fontWeight:600, color:T.ac, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{downloading?"Downloading...":fname}</div>
          <div style={{ fontSize:10, color:T.mt }}>{sizeMB} · {info.mime_type_hint||"encrypted"}</div>
        </div>
        <I.Download />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// Link Embed — YouTube/video embeds + domain cards for URLs
// ═══════════════════════════════════════════════════════════
function LinkEmbed({ text }) {
  if (!text || localStorage.getItem("d_show_embeds")==="false") return null;
  const urls = text.match(/https?:\/\/[^\s<]+/g);
  if (!urls) return null;

  // Skip URLs that are already rendered as images/videos by parseMsg
  const mediaExts = /\.(gif|gifv|webp|jpg|jpeg|png|bmp|svg|mp4|webm|mov|ogg|m4v)(\?.*)?$/i;

  return urls.filter(u => !mediaExts.test(u)).slice(0, 3).map((url, i) => {
    // YouTube embed
    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) {
      return (
        <div key={i} style={{ marginTop:6, maxWidth:400, borderRadius:8, overflow:"hidden", border:`1px solid ${T.bd}`, background:T.sf2 }}>
          <iframe src={`https://www.youtube-nocookie.com/embed/${ytMatch[1]}`} width="100%" height="225" style={{ display:"block", border:"none" }} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen loading="lazy" />
          <div style={{ padding:"6px 10px", fontSize:11, color:T.mt, display:"flex", alignItems:"center", gap:4 }}>
            <span style={{ color:"#ff0000", fontWeight:700, fontSize:12 }}>▶</span> YouTube
          </div>
        </div>
      );
    }

    // Twitch embed
    const twitchMatch = url.match(/twitch\.tv\/([a-zA-Z0-9_]+)/);
    if (twitchMatch) {
      return (
        <div key={i} style={{ marginTop:6, maxWidth:400, borderRadius:8, overflow:"hidden", border:`1px solid ${T.bd}`, background:T.sf2, padding:"8px 12px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ color:"#9146ff", fontWeight:700 }}>⬤</span>
            <span style={{ fontSize:13, fontWeight:600, color:T.tx }}>{twitchMatch[1]}</span>
            <span style={{ fontSize:11, color:T.mt }}>on Twitch</span>
          </div>
          <a href={url} target="_blank" rel="noopener noreferrer" style={{ fontSize:11, color:T.ac, marginTop:4, display:"block" }}>Open in Twitch →</a>
        </div>
      );
    }

    // GitHub repo
    const ghMatch = url.match(/github\.com\/([a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+)/);
    if (ghMatch) {
      return (
        <div key={i} style={{ marginTop:6, maxWidth:400, borderRadius:8, overflow:"hidden", border:`1px solid ${T.bd}`, background:T.sf2, padding:"8px 12px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:14 }}>🐙</span>
            <span style={{ fontSize:13, fontWeight:600, color:T.tx }}>{ghMatch[1]}</span>
          </div>
          <a href={url} target="_blank" rel="noopener noreferrer" style={{ fontSize:11, color:T.ac, marginTop:4, display:"block" }}>View on GitHub →</a>
        </div>
      );
    }

    // Generic link card (domain + favicon)
    try {
      const domain = new URL(url).hostname.replace("www.", "");
      return (
        <div key={i} style={{ marginTop:6, maxWidth:400, borderRadius:6, border:`1px solid ${T.bd}`, background:T.sf2, padding:"6px 10px", display:"flex", alignItems:"center", gap:8 }}>
          <img src={`https://www.google.com/s2/favicons?domain=${domain}&sz=32`} width="16" height="16" style={{ borderRadius:2, flexShrink:0 }} alt="" loading="lazy" onError={e=>{e.target.style.display="none";}} />
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:600, color:T.tx, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{domain}</div>
            <a href={url} target="_blank" rel="noopener noreferrer" style={{ fontSize:10, color:T.ac, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"block" }}>{url.length > 60 ? url.slice(0,60)+"..." : url}</a>
          </div>
          <span style={{ color:T.mt, fontSize:12, flexShrink:0 }}>↗</span>
        </div>
      );
    } catch { return null; }
  });
}

              const [confirmPw, setConfirmPw] = useState("");

              const handleDelete = async () => {

                  if (!check.ok) { alert("Incorrect password. Account NOT deleted."); setDeleting(false); return; }
                  await api.deleteAccount();
                  localStorage.clear();

function EditChannelModal({ channel, serverId, allRoles, onClose, onSave }) {
  const [name, setName] = useState(channel?.name||"");
  const [topic, setTopic] = useState(channel?.topic||"");
  const [locked, setLocked] = useState(channel?.locked||false);
  const [minRolePos, setMinRolePos] = useState(channel?.min_role_position||0);
  const [slowmode, setSlowmode] = useState(channel?.slowmode_seconds||0);
  const [customSlowmode, setCustomSlowmode] = useState("");
  const [nsfw, setNsfw] = useState(channel?.nsfw||false);
  const [ttl, setTtl] = useState(channel?.message_ttl_seconds||0);
  const [customTtl, setCustomTtl] = useState("");
  const [tab, setTab] = useState("general");
  const [saved, setSaved] = useState("");

  const handleSave = async () => {
    const data = {};
    if(name.trim() && name!==channel?.name) data.name = name.trim().toLowerCase().replace(/\s+/g,"-");
    if(topic!==channel?.topic) data.topic = topic;
    if(locked!==channel?.locked) data.locked = locked;
    if(minRolePos!==(channel?.min_role_position||0)) data.min_role_position = minRolePos;
    if(slowmode!==(channel?.slowmode_seconds||0)) data.slowmode_seconds = slowmode;
    if(nsfw!==channel?.nsfw) data.nsfw = nsfw;
    if(ttl!==(channel?.message_ttl_seconds||0)) data.message_ttl_seconds = ttl;
    if(Object.keys(data).length) {
      await api.updateChannel(channel.id, data);
      setSaved("Saved!"); setTimeout(()=>setSaved(""),1500);
    }

  };

        ))}

          <input value={name} onChange={e=>setName(e.target.value)} style={getInp()} />
        </div>
        <div style={section}>
          <label style={lbl}>Topic</label>
          <input value={topic} onChange={e=>setTopic(e.target.value)} style={getInp()} placeholder="What's this channel about?" />
        </div>
        <div style={{...section, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div><div style={{ fontSize:13, fontWeight:600 }}>NSFW Channel</div><div style={{ fontSize:11, color:T.mt }}>Mark this channel as age-restricted</div></div>
          {toggle(nsfw, ()=>setNsfw(!nsfw))}
        </div>
      </>)}

      {tab==="permissions"&&(<>
        <div style={{...section, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div>
            <div style={{ fontSize:13, fontWeight:600, display:"flex", alignItems:"center", gap:6 }}><I.Lock s={14} /> Lock Channel</div>
            <div style={{ fontSize:11, color:T.mt }}>Only roles with explicit permission can send messages</div>
          </div>
          {toggle(locked, ()=>setLocked(!locked))}

        <div style={section}>

          <div style={{ fontSize:11, color:T.mt, marginBottom:8 }}>Hide this channel from users below a certain role level. 0 = visible to everyone.</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {[{label:"Everyone",pos:0},{label:"Members (1+)",pos:1},{label:"Moderators (5+)",pos:5},{label:"Admins (10+)",pos:10}].map(opt=>(
              <div key={opt.pos} onClick={()=>setMinRolePos(opt.pos)} style={{ padding:"6px 12px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600,
                border:`2px solid ${minRolePos===opt.pos?T.ac:T.bd}`, color:minRolePos===opt.pos?T.ac:T.mt,
                background:minRolePos===opt.pos?"rgba(0,212,170,0.08)":"transparent" }}>{opt.label}</div>
            ))}
          </div>
          <div style={{ marginTop:8, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:11, color:T.mt }}>Custom level:</span>
            <input type="number" value={minRolePos} onChange={e=>setMinRolePos(parseInt(e.target.value)||0)} min={0} max={100} style={{...getInp(), width:70, padding:"4px 8px", fontSize:12}} />
          </div>
        </div>
      </>)}

      {tab==="advanced"&&(<>
        <div style={section}>
          <label style={lbl}><I.Clock /> Slowmode</label>
          <div style={{ fontSize:11, color:T.mt, marginBottom:8 }}>Limit how often users can send messages</div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {SLOWMODE_PRESETS.map(p=>(
              <div key={p.value} onClick={()=>{if(p.value===-1){const v=parseInt(prompt("Seconds between messages:")||"0");if(v>0)setSlowmode(v);}else setSlowmode(p.value);}}
                style={{ padding:"5px 10px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600,
                  border:`2px solid ${slowmode===p.value||(p.value===-1&&!SLOWMODE_PRESETS.find(x=>x.value===slowmode&&x.value!==-1))?T.ac:T.bd}`,
                  color:slowmode===p.value?T.ac:T.mt }}>{p.label}</div>
            ))}
          </div>
          {slowmode > 0 && <div style={{ fontSize:11, color:T.ac, marginTop:6 }}>Current: {slowmode}s between messages</div>}
        </div>

        <div style={section}>
          <label style={lbl}><I.Clock /> Auto-Delete Messages</label>
          <div style={{ fontSize:11, color:T.mt, marginBottom:8 }}>Messages older than this will be automatically deleted</div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {TTL_PRESETS.map(p=>(
              <div key={p.value} onClick={()=>{
                if(p.value===-1){
                  const input = prompt("Enter custom duration:\nExamples: 2h, 12h, 3d, 14d, 90d");
                  if(input){
                    const m = input.match(/^(\d+)\s*(h|d|m|s)?$/i);
                    if(m){
                      const n=parseInt(m[1]);
                      const u=(m[2]||"s").toLowerCase();
                      const secs = u==="d"?n*86400:u==="h"?n*3600:u==="m"?n*60:n;
                      setTtl(secs);
                    }
                  }
                } else setTtl(p.value);
              }}
                style={{ padding:"5px 10px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600,
                  border:`2px solid ${ttl===p.value?T.ac:T.bd}`, color:ttl===p.value?T.ac:T.mt }}>{p.label}</div>
            ))}
          </div>
          {ttl > 0 && <div style={{ fontSize:11, color:T.ac, marginTop:6 }}>Current: {ttl>=86400?Math.round(ttl/86400)+"d":ttl>=3600?Math.round(ttl/3600)+"h":ttl+"s"}</div>}
        </div>
      </>)}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:16, paddingTop:16, borderTop:`1px solid ${T.bd}` }}>
        {saved ? <span style={{ color:T.ac, fontSize:13, fontWeight:600 }}>{saved}</span> : <span />}
        <button onClick={handleSave} className="pill-btn" style={{ background:T.ac, color:"#000", padding:"10px 24px", fontSize:14, fontWeight:700 }}>Save Changes</button>
      </div>
    </div>
  );
}

            setSearching(true); setDeleted(null);

              const data = await api.getMessagesBatch(searchChannel, 500);
              const arr = Array.isArray(data) ? data : (data?.messages || []);
              const found = [];
              for (const m of arr) {
                try {
                  const text = await crypt.decrypt(m.content_ciphertext, searchChannel, m.mls_epoch);
                  if (text && text.toLowerCase().includes(searchTerm.toLowerCase())) {
                    found.push({ id: m.id, text, author_id: m.author_id, created_at: m.created_at });
                  }
                } catch {}
              }
              setSearchResults(found);
            } catch {}
            setSearching(false);
          };

          const doBulkDelete = async () => {
            if (!searchResults.length || !searchChannel) return;
            try {
              const result = await api.bulkDeleteMessages(searchChannel, searchResults.map(m => m.id), `Mod search: "${searchTerm}"`);
              setDeleted(result.deleted || searchResults.length);
              setSearchResults([]);
            } catch {}
          };

          const modTabs = [
            { id: "search", label: "Search & Delete", icon: <I.Search /> },
            { id: "automod", label: "Auto-Moderation", icon: <I.Shield /> },
            { id: "permissions", label: "Channel Mods", icon: <I.Users /> },
            { id: "timeout", label: "Timeouts", icon: <I.Clock /> },
          ];

          return (<>
            <div style={{ display:"flex", gap:4, marginBottom:16, flexWrap:"wrap" }}>
              {modTabs.map(t => (
                <div key={t.id} onClick={() => setModTab(t.id)} style={{ display:"flex", alignItems:"center", gap:5, padding:"6px 12px", borderRadius:6, fontSize:12, fontWeight:600, cursor:"pointer", color: modTab === t.id ? T.ac : T.mt, background: modTab === t.id ? "rgba(0,212,170,0.1)" : "transparent", border: `1px solid ${modTab === t.id ? T.ac+"44" : T.bd}` }}>
                  {t.icon} {t.label}
                </div>
              ))}
            </div>

            {modTab === "search" && (<>
              <div style={{ fontSize:11, fontWeight:700, color:T.mt, textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>Search Messages & Bulk Delete</div>
              <div style={{ fontSize:12, color:T.mt, marginBottom:12, lineHeight:1.5 }}>Search decrypted messages in a channel for a word or phrase. Zero-knowledge: the search runs on your device. The server never sees the search term.</div>
              <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                <select value={searchChannel} onChange={e => setSearchChannel(e.target.value)} style={{ ...getInp(), flex:1 }}>
                  <option value="">Select channel...</option>
                  {modChannels.map(ch => <option key={ch.id} value={ch.id}>#{ch.name}</option>)}
                </select>
              </div>
              <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} onKeyDown={e => { if (e.key === "Enter") doSearch(); }} placeholder="Enter word or phrase..." style={{ ...getInp(), flex:1 }} />
                <button onClick={doSearch} disabled={searching || !searchTerm.trim() || !searchChannel} style={{ ...btn(!!searchTerm.trim() && !!searchChannel), width:90 }}>{searching ? "..." : "Search"}</button>
              </div>
              {deleted !== null && (
                <div style={{ padding:16, textAlign:"center", color:T.ac, background:T.sf2, borderRadius:10, marginBottom:12 }}>
                  <div style={{ fontSize:20, marginBottom:6 }}>✓</div>
                  <div style={{ fontSize:14, fontWeight:600 }}>{deleted} message{deleted !== 1 ? "s" : ""} deleted</div>
                  <div style={{ fontSize:11, color:T.mt, marginTop:4 }}>Recorded in the audit log as BULK_DELETE_MESSAGES.</div>
                </div>
              )}
              {searchResults.length > 0 && (<>
                <div style={{ fontSize:12, color:T.warn, fontWeight:600, marginBottom:8 }}>Found {searchResults.length} message{searchResults.length !== 1 ? "s" : ""} containing "{searchTerm}"</div>
                <div style={{ maxHeight:200, overflowY:"auto", marginBottom:12, borderRadius:8, border:`1px solid ${T.bd}` }}>
                  {searchResults.map(m => (
                    <div key={m.id} style={{ padding:"6px 10px", borderBottom:`1px solid ${T.bd}`, fontSize:12 }}>
                      <span style={{ color:T.ac, fontWeight:600 }}>{getName(m.author_id)}</span>
                      <span style={{ color:T.mt, marginLeft:6, fontSize:10 }}>{new Date(m.created_at).toLocaleString()}</span>
                      <div style={{ color:T.tx, marginTop:2, wordBreak:"break-word" }}>{m.text?.length > 120 ? m.text.slice(0, 120) + "..." : m.text}</div>
                    </div>
                  ))}
                </div>
                <button onClick={doBulkDelete} style={{ ...btn(true), background:`linear-gradient(135deg,${T.err},#ff6b6b)`, color:"#fff" }}>Delete All {searchResults.length} Messages</button>
              </>)}
              {searching && <div style={{ textAlign:"center", padding:16, color:T.mt }}>Searching decrypted messages...</div>}
              {!searching && searchTerm && searchResults.length === 0 && deleted === null && <div style={{ textAlign:"center", padding:16, color:T.mt }}>No matches found.</div>}
            </>)}

            {modTab === "automod" && (<>
              <div style={{ fontSize:11, fontWeight:700, color:T.mt, textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>Auto-Moderation Rules</div>
              <div style={{ fontSize:12, color:T.mt, marginBottom:16, lineHeight:1.5 }}>Set up automatic moderation rules. Because Citadel is zero-knowledge, auto-mod runs on each client — not the server. Rules are synced via encrypted server settings.</div>
              {[
                { key:"spam_detect", label:"Spam Detection", desc:"Flag rapid-fire duplicate messages (5+ in 10s)", default:true },
                { key:"invite_filter", label:"Invite Link Filter", desc:"Block invite links from other platforms (Discord, Slack, etc.)", default:false },
                { key:"caps_filter", label:"Excessive Caps Filter", desc:"Flag messages that are >70% uppercase (10+ chars)", default:false },
                { key:"mention_spam", label:"Mass Mention Protection", desc:"Block messages with 5+ @mentions", default:true },
                { key:"new_account_slowmode", label:"New Member Slowmode", desc:"Auto-apply 30s slowmode to accounts <24h old", default:false },
              ].map(rule => {
                const storageKey = `mod_${server.id}_${rule.key}`;
                const isOn = JSON.parse(localStorage.getItem(storageKey) ?? (rule.default ? "true" : "false"));
                return (
                  <div key={rule.key} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 12px", background:T.sf2, borderRadius:8, marginBottom:6 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:T.tx }}>{rule.label}</div>
                      <div style={{ fontSize:11, color:T.mt, marginTop:2 }}>{rule.desc}</div>
                    </div>
                    <div onClick={() => { localStorage.setItem(storageKey, JSON.stringify(!isOn)); setModTab("automod"); }} style={{ width:40, height:22, borderRadius:11, background:isOn ? T.ac : T.bd, cursor:"pointer", position:"relative", transition:"background .2s" }}>
                      <div style={{ width:18, height:18, borderRadius:9, background:"#fff", position:"absolute", top:2, left:isOn ? 20 : 2, transition:"left .2s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)" }} />
                    </div>
                  </div>
                );
              })}
            </>)}

            {modTab === "permissions" && (<>
              <div style={{ fontSize:11, fontWeight:700, color:T.mt, textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>Channel Moderators</div>
              <div style={{ fontSize:12, color:T.mt, marginBottom:16, lineHeight:1.5 }}>Assign moderator roles to specific channels. Channel mods can delete messages, manage pins, and timeout users within their assigned channels — even if they don't have server-wide permissions.</div>
              <div style={{ fontSize:12, color:T.mt, marginBottom:12, fontStyle:"italic" }}>Tip: Create a "Channel Mod" role in the Roles tab with MANAGE_MESSAGES permission, then assign it to users. Use per-channel overrides for fine-grained control.</div>
              {modChannels.map(ch => (
                <div key={ch.id} style={{ padding:"10px 12px", background:T.sf2, borderRadius:8, marginBottom:6 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                    <I.Hash s={14} />
                    <span style={{ fontSize:13, fontWeight:600, color:T.tx }}>{ch.name}</span>
                    <span style={{ fontSize:11, color:T.mt, marginLeft:"auto" }}>
                      {ch.locked ? "🔒 Locked" : ch.min_role_position > 0 ? "🔐 Restricted" : "🌐 Public"}
                    </span>
                  </div>
                  <div style={{ fontSize:11, color:T.mt }}>
                    TTL: {ch.message_ttl_seconds > 0 ? (ch.message_ttl_seconds >= 86400 ? Math.round(ch.message_ttl_seconds / 86400) + "d" : ch.message_ttl_seconds >= 3600 ? Math.round(ch.message_ttl_seconds / 3600) + "h" : ch.message_ttl_seconds + "s") : "Forever"}
                    {ch.slowmode_seconds > 0 && ` · Slowmode: ${ch.slowmode_seconds}s`}
                    {ch.nsfw && " · NSFW"}
                  </div>
                </div>
              ))}
            </>)}

            {modTab === "timeout" && (<>
              <div style={{ fontSize:11, fontWeight:700, color:T.mt, textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>Active Timeouts</div>
              <div style={{ fontSize:12, color:T.mt, marginBottom:12, lineHeight:1.5 }}>Manage users currently timed out. Timed-out users can read messages but cannot send, react, or join voice channels.</div>
              {(() => {
                try {
                  const tos = JSON.parse(localStorage.getItem("d_timeouts") || "{}");
                  const active = Object.entries(tos).filter(([, exp]) => exp > Date.now());
                  if (active.length === 0) return <div style={{ textAlign:"center", padding:20, color:T.mt }}>No active timeouts.</div>;
                  return active.map(([uid, exp]) => (

                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:600, color:T.tx }}>{getName(uid) || uid.slice(0, 8)}</div>

          </button>
          {chainVerify && (
            <span style={{ fontSize:12, color: chainVerify.chain_intact ? "#00d4aa" : "#ff4757", fontWeight:600 }}>
              {chainVerify.chain_intact
                ? `Chain intact — ${chainVerify.verified_entries} entries verified`
                : `CHAIN BROKEN at seq #${chainVerify.first_broken_at}: ${chainVerify.first_broken_reason}`}
            </span>
          )}
        </div>
        {auditLog.length===0&&<div style={{ color:T.mt, fontSize:13, textAlign:"center", padding:"20px 0" }}>No audit log entries</div>}
        {auditLog.map(e=>(
          <div key={e.id} style={{ padding:"8px 10px", borderRadius:8, marginBottom:4, background:T.sf2 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <Av name={e.actor_username||"?"} size={24} />
              <div style={{ flex:1 }}>
                <span style={{ fontSize:13, fontWeight:600, color:T.tx }}>{e.actor_username||"?"}</span>{" "}
                <span style={{ fontSize:13, color:T.mt }}>{actionLabels[e.action]||e.action}</span>

              </div>
              <span style={{ fontSize:11, color:T.mt, whiteSpace:"nowrap" }}>{new Date(e.created_at).toLocaleDateString()}</span>
            </div>
            {e.chain_hash && (
              <div style={{ marginTop:4, paddingLeft:34, fontSize:10, fontFamily:"monospace", color:T.mt, opacity:0.6 }}>
                #{e.sequence_num} — {e.chain_hash?.slice(0,16)}...
              </div>
            )}
          </div>
        ))}
      </>)}
    </Modal>
  );
}

// Device Selector & Audio Controls
// ═══════════════════════════════════════════════════════════
function DeviceSelector({ label, kind, storageKey, onChange }) {
  const [devices, setDevices] = useState([]);
  const [selected, setSelected] = useState(localStorage.getItem(storageKey)||"default");
  useEffect(()=>{
    navigator.mediaDevices?.enumerateDevices().then(all=>{
      setDevices(all.filter(d=>d.kind===kind));
    }).catch(()=>{});
    navigator.mediaDevices?.addEventListener("devicechange", ()=>{
      navigator.mediaDevices.enumerateDevices().then(all=>setDevices(all.filter(d=>d.kind===kind))).catch(()=>{});
    });
  },[kind]);
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:12, color:T.tx, marginBottom:4 }}>{label}</div>
      <select value={selected} onChange={e=>{setSelected(e.target.value);localStorage.setItem(storageKey,e.target.value);onChange(e.target.value);}}
        style={{ width:"100%", padding:"8px 10px", borderRadius:6, border:`1px solid ${T.bd}`, background:T.bg, color:T.tx, fontSize:12, cursor:"pointer", outline:"none" }}>
        <option value="default">Default Device</option>
        {devices.map(d=><option key={d.deviceId} value={d.deviceId}>{d.label||`${kind} ${d.deviceId.slice(0,8)}`}</option>)}
      </select>
    </div>
  );
}

function AudioToggle({ label, storageKey, defaultVal, desc, onChange }) {
  const [on, setOn] = useState(()=>{const v=localStorage.getItem(storageKey);return v!==null?v==="true":defaultVal;});
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${T.bd}22` }}>
      <div>
        <div style={{ fontSize:12, color:T.tx, fontWeight:500 }}>{label}</div>
        {desc && <div style={{ fontSize:10, color:T.mt }}>{desc}</div>}
      </div>
      <div onClick={()=>{const nv=!on;setOn(nv);localStorage.setItem(storageKey,String(nv));onChange(nv);}}
        style={{ width:36, height:20, borderRadius:10, background:on?T.ac:"#555", cursor:"pointer", position:"relative", transition:"background 0.2s" }}>
        <div style={{ width:16, height:16, borderRadius:8, background:"#fff", position:"absolute", top:2, left:on?18:2, transition:"left 0.2s" }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// Video Grid for Video Calls
// ═══════════════════════════════════════════════════════════
function VideoTile({ stream, label, muted }) {
  const ref = useRef(null);
  useEffect(()=>{ if(ref.current && stream) { ref.current.srcObject = stream; } },[stream]);
  return (
    <div style={{ position:"relative", borderRadius:8, overflow:"hidden", background:"#111", aspectRatio:"16/9", minHeight:180 }}>
      <video ref={ref} autoPlay playsInline muted={muted} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
      <div style={{ position:"absolute", bottom:6, left:6, background:"rgba(0,0,0,0.7)", padding:"2px 8px", borderRadius:4, fontSize:11, color:"#fff", fontWeight:600 }}>{label}</div>
    </div>
  );
}

function VideoGrid({ streams, localName, peers, fullscreen, onToggleFullscreen }) {
  const entries = Object.entries(streams).filter(([,s])=>s);
  if(entries.length===0) return null;
  const cols = entries.length <= 1 ? 1 : entries.length <= 4 ? 2 : 3;
  const maxH = fullscreen ? "calc(100vh - 110px)" : entries.length === 1 ? "55vh" : entries.length <= 4 ? "45vh" : "40vh";
  return (
    <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols}, 1fr)`, gap:6, padding:10, background:"rgba(0,0,0,0.3)", borderRadius:10, marginBottom:fullscreen?0:10, maxHeight:maxH, overflow:"hidden", flexShrink:0, position:"relative" }}>
      {entries.map(([key, stream])=>{
        const isLocal = key==="local";
        const isScreen = key==="screen";
        const peer = peers.find(p=>p.id===key);
        const label = isLocal ? `${localName} (You)` : isScreen ? `${localName} (Screen)` : (peer?.name || "Peer");
        return <VideoTile key={key} stream={stream} label={label} muted={isLocal||isScreen} />;
      })}
      {onToggleFullscreen && <div onClick={onToggleFullscreen} style={{ position:"absolute", top:8, right:8, padding:"4px 8px", background:"rgba(0,0,0,0.7)", borderRadius:4, cursor:"pointer", fontSize:10, color:"#fff", fontWeight:600, zIndex:2 }} title={fullscreen?"Exit Fullscreen":"Fullscreen"}>{fullscreen?"⊖ Exit":"⊕ Full"}</div>}
    </div>
  );
}

const EMOJI_CATS = Object.keys(EMOJI_DATA);

function EmojiPicker({ onSelect, onClose, full }) {
  const [cat, setCat] = useState("Smileys");
  const [search, setSearch] = useState("");
  const [recent, setRecent] = useState(()=>{try{return JSON.parse(localStorage.getItem("d_recent_emoji")||"[]");}catch{return[];}});
  const ref = useRef(null);
  const inputRef = useRef(null);

  useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    setTimeout(()=>document.addEventListener("mousedown",h),50);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  useEffect(()=>{if(full)inputRef.current?.focus();},[full]);

  const pick = (e) => {
    onSelect(e);
    // Track recently used
    const next = [e,...recent.filter(x=>x!==e)].slice(0,24);
    setRecent(next); localStorage.setItem("d_recent_emoji",JSON.stringify(next));
    if(!full) onClose();
  };

  // Quick mode (reaction picker) - just show top row
  if (!full) return (
    <div ref={ref} style={{ position:"absolute", bottom:"100%", right:0, marginBottom:4, padding:"6px 8px", background:T.sf, borderRadius:10, border:`1px solid ${T.bd}`, display:"flex", gap:2, zIndex:50, boxShadow:"0 4px 20px rgba(0,0,0,0.4)" }}>
      {QUICK_EMOJIS.map(e=>(
        <div key={e} onClick={()=>pick(e)} style={{ width:30, height:30, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:6, cursor:"pointer", fontSize:16, transition:"background .1s" }}
          onMouseEnter={ev=>ev.target.style.background="rgba(255,255,255,0.08)"} onMouseLeave={ev=>ev.target.style.background="transparent"}>{e}</div>
      ))}
    </div>
  );

  // Full mode - category browser + search
  const allEmojis = search ? EMOJI_CATS.flatMap(c=>EMOJI_DATA[c].emojis.filter(e=>true)) : EMOJI_DATA[cat]?.emojis || [];
  const filtered = search ? EMOJI_CATS.flatMap(c=>EMOJI_DATA[c].emojis).filter((e,i,a)=>a.indexOf(e)===i) : allEmojis;

  return (
    <div ref={ref} style={{ position:"absolute", bottom:"100%", right:0, marginBottom:4, width:352, maxHeight:400, background:T.sf, borderRadius:12, border:`1px solid ${T.bd}`, zIndex:100, boxShadow:"0 8px 32px rgba(0,0,0,0.5)", display:"flex", flexDirection:"column", overflow:"hidden" }}>
      {/* Search */}
      <div style={{ padding:"8px 10px 4px" }}>
        <input ref={inputRef} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search emojis..." style={{ width:"100%", background:T.bg, border:`1px solid ${T.bd}`, borderRadius:6, color:T.tx, fontSize:12, padding:"6px 10px", outline:"none", boxSizing:"border-box", fontFamily:"'DM Sans',sans-serif" }} />
      </div>
      {/* Category tabs */}
      {!search && <div style={{ display:"flex", padding:"2px 6px", gap:1, borderBottom:`1px solid ${T.bd}` }}>
        {EMOJI_CATS.map(c=>(
          <div key={c} onClick={()=>setCat(c)} title={c} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:"5px 0", cursor:"pointer", fontSize:14, borderBottom:cat===c?`2px solid ${T.ac}`:"2px solid transparent", opacity:cat===c?1:0.5, transition:"opacity .15s" }}>{EMOJI_DATA[c].icon}</div>
        ))}
      </div>}
      {/* Recently used — respects d_show_recent_emoji toggle */}
      {!search && recent.length>0 && cat==="Smileys" && localStorage.getItem("d_show_recent_emoji")!=="false" && (
        <div style={{ padding:"6px 8px 2px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:T.mt, textTransform:"uppercase", marginBottom:4 }}>Recently Used</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:1 }}>
            {recent.map((e,i)=>(
              <div key={i} onClick={()=>pick(e)} style={{ width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:6, cursor:"pointer", fontSize:18 }}
                onMouseEnter={ev=>ev.currentTarget.style.background="rgba(255,255,255,0.08)"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>{e}</div>
            ))}
          </div>
          <div style={{ height:1, background:T.bd, margin:"4px 0" }} />
        </div>
      )}
      {/* Emoji grid */}
      <div style={{ flex:1, overflowY:"auto", padding:"4px 8px 8px" }} ref={el=>{if(el&&window.twemoji)twemoji.parse(el,{folder:"svg",ext:".svg",base:"https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/"});}}>
        {!search && <div style={{ fontSize:10, fontWeight:700, color:T.mt, textTransform:"uppercase", marginBottom:4 }}>{cat}</div>}
        <div style={{ display:"flex", flexWrap:"wrap", gap:1 }}>
          {filtered.map((e,i)=>(
            <div key={i} onClick={()=>pick(e)} style={{ width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:6, cursor:"pointer", fontSize:18, transition:"transform .1s" }}
              onMouseEnter={ev=>{ev.currentTarget.style.background="rgba(255,255,255,0.08)";ev.currentTarget.style.transform="scale(1.2)";}}
              onMouseLeave={ev=>{ev.currentTarget.style.background="transparent";ev.currentTarget.style.transform="scale(1)";}}>{e}</div>
          ))}
        </div>
      </div>
      {/* Footer count */}
      <div style={{ padding:"4px 10px", borderTop:`1px solid ${T.bd}`, fontSize:10, color:T.mt, textAlign:"center" }}>
        {EMOJI_CATS.reduce((s,c)=>s+EMOJI_DATA[c].emojis.length,0)} emojis across {EMOJI_CATS.length} categories
      </div>
    </div>
  );
}

function GifPicker({ onSelect, onClose }) {
  const [query, setQuery] = useState("");
  const [gifs, setGifs] = useState([]);
  const [trending, setTrending] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const ref = useRef(null);

  useEffect(() => {
    // Load trending on mount
    fetch("https://g.tenor.com/v1/trending?key=LIVDSRZULELA&limit=20&media_filter=minimal")
      .then(r=>r.json()).then(d=>setTrending(d.results||[])).catch(()=>setError("Could not load GIFs"));
    const h = (e) => { if(ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const search = async (q) => {
    if(!q.trim()) { setGifs([]); setError(null); return; }
    setLoading(true); setError(null);
    try {
      const r = await fetch(`https://g.tenor.com/v1/search?q=${encodeURIComponent(q)}&key=LIVDSRZULELA&limit=20&media_filter=minimal`);
      const d = await r.json();
      setGifs(d.results||[]);
      if(!d.results?.length) setError("No GIFs found");
    } catch { setError("Search failed — check connection"); }
    setLoading(false);
  };

  useEffect(() => {
    const timer = setTimeout(() => { if(query) search(query); else setError(null); }, 300);
    return () => clearTimeout(timer);
  }, [query]);

  const results = query ? gifs : trending;
  const getUrl = (g) => g?.media?.[0]?.tinygif?.url || g?.media?.[0]?.gif?.url || "";
  const getFullUrl = (g) => g?.media?.[0]?.gif?.url || g?.media?.[0]?.tinygif?.url || "";

  return ReactDOM.createPortal(
    <div ref={ref} style={{ position:"fixed", bottom:70, right:80, width:340, maxHeight:420, background:"#111320", borderRadius:12, border:`1px solid ${T.bd}`, boxShadow:"0 12px 40px rgba(0,0,0,0.6)", display:"flex", flexDirection:"column", zIndex:10000, overflow:"hidden", fontFamily:"'DM Sans',sans-serif" }}>
      <div style={{ padding:"10px 12px 8px", borderBottom:`1px solid ${T.bd}`, display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:14, fontWeight:700, color:T.ac }}>GIF</span>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search GIFs..." autoFocus style={{ flex:1, background:T.bg, border:`1px solid ${T.bd}`, borderRadius:8, padding:"8px 12px", color:T.tx, fontSize:13, outline:"none", fontFamily:"'DM Sans',sans-serif", boxSizing:"border-box" }} />
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:6 }}>
        {loading && <div style={{ textAlign:"center", padding:20, color:T.mt }}>Searching...</div>}
        {error && !loading && <div style={{ textAlign:"center", padding:20, color:T.mt, fontSize:12 }}>{error}</div>}
        {!loading && !error && results.length === 0 && !query && <div style={{ textAlign:"center", padding:20, color:T.mt, fontSize:12 }}>Loading trending GIFs...</div>}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:4 }}>
          {results.map((g, i) => {
            const url = getUrl(g);
            return url ? <img key={g.id||i} src={url} onClick={()=>{onSelect(getFullUrl(g));onClose();}} style={{ width:"100%", borderRadius:6, cursor:"pointer", display:"block", background:T.sf2 }} loading="lazy" alt="" /> : null;
          })}
        </div>
      </div>
    </div>,
    document.body
  );
}

// User Profile Card — click any username to open

function UserProfileCard({ userId, pos, onClose, curServer, isOwner, canMod, onKick, onBan, onAssignRole, onUnassignRole, allRoles, perms, onConfigBot }) {

// Error Boundary — prevents black screen, shows error instead
// ═══════════════════════════════════════════════════════════
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { this.setState({ info }); console.error("Discreet UI Error:", error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", { style: { padding: 40, color: "#ff4757", fontFamily: "'JetBrains Mono', monospace", background: "#07090f", minHeight: "100vh" } },
        React.createElement("h2", { style: { color: "#00d4aa", marginBottom: 16 } }, "🛡️ Discreet — Something went wrong"),
        React.createElement("p", { style: { color: "#dde0ea", marginBottom: 16, fontFamily: "'DM Sans', sans-serif" } }, "The UI hit an error. This is a bug report — copy this and share it."),
        React.createElement("pre", { style: { background: "#111320", padding: 16, borderRadius: 8, overflow: "auto", fontSize: 12, border: "1px solid #1a1e30" } },
          String(this.state.error) + "\n\n" + (this.state.info?.componentStack || "")
        ),
        React.createElement("button", {
          onClick: () => { this.setState({ hasError: false, error: null, info: null }); },
          style: { marginTop: 16, padding: "10px 24px", background: "#00d4aa", color: "#000", border: "none", borderRadius: 8, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }
        }, "Try Again"),
        React.createElement("button", {
          onClick: () => { localStorage.clear(); window.location.reload(); },
          style: { marginTop: 16, marginLeft: 12, padding: "10px 24px", background: "#ff4757", color: "#fff", border: "none", borderRadius: 8, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }
        }, "Hard Reset")
      );
    }
    return this.props.children;
  }
}

// ═══════════════════════════════════════════════════════════
// Search Panel — Server-wide search (messages client-side, members via API)
// ═══════════════════════════════════════════════════════════
function SearchPanel({ messages, dmMsgs, members, channels, curServer, curChannel, curDm, view, getName, onNavigate, onClose }) {
  const [query, setQuery] = useState("");
  const [tab, setTab] = useState("messages"); // messages, members, users
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [memberResults, setMemberResults] = useState([]);
  const [userResults, setUserResults] = useState([]);
  const [sharedServers, setSharedServers] = useState({}); // {userId: [servers]}
  const [filters, setFilters] = useState({ channel: null, author: null, before: null, after: null });
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  // Parse advanced search syntax: from:username in:#channel before:date after:date
  const parseQuery = (q) => {
    let text = q;
    let author = null, channel = null, before = null, after = null;
    // from:username
    const fromMatch = text.match(/from:(\S+)/i);
    if (fromMatch) { author = fromMatch[1].toLowerCase(); text = text.replace(fromMatch[0], ""); }
    // in:#channel
    const inMatch = text.match(/in:#?(\S+)/i);
    if (inMatch) { channel = inMatch[1].toLowerCase(); text = text.replace(inMatch[0], ""); }
    // before:date
    const beforeMatch = text.match(/before:(\S+)/i);
    if (beforeMatch) { before = new Date(beforeMatch[1]); text = text.replace(beforeMatch[0], ""); }
    // after:date
    const afterMatch = text.match(/after:(\S+)/i);
    if (afterMatch) { after = new Date(afterMatch[1]); text = text.replace(afterMatch[0], ""); }
    return { text: text.trim().toLowerCase(), author, channel, before, after };
  };

  const doSearch = async () => {
    if (!query.trim()) { setResults([]); return; }
    setSearching(true);

    if (tab === "messages") {
      // Client-side message search (E2EE — server can't search content)
      const parsed = parseQuery(query);
      const allMsgs = view === "server" ? messages : dmMsgs;
      const filtered = allMsgs.filter(m => {
        // Text match
        if (parsed.text && m.text && !m.text.toLowerCase().includes(parsed.text)) return false;
        if (parsed.text && !m.text) return false;
        // Author filter
        if (parsed.author) {
          const authorName = getName(m.author_id).toLowerCase();
          if (!authorName.includes(parsed.author)) return false;
        }
        // Channel filter (server view only)
        if (parsed.channel && view === "server") {
          const ch = channels.find(c => c.id === m.channel_id);
          if (!ch || !ch.name.toLowerCase().includes(parsed.channel)) return false;
        }
        // Date filters
        if (parsed.before && new Date(m.created_at) > parsed.before) return false;
        if (parsed.after && new Date(m.created_at) < parsed.after) return false;
        return true;
      });

      setSharedServers(shared);
    }

    setSearching(false);
  };

  useEffect(() => {
    const t = setTimeout(() => { if (query.trim().length >= 2) doSearch(); }, 300);

            {results.map(m => {

              // Highlight matching text

              let textPreview = m.text || "";

              return (
                <div key={m.id} onClick={() => {
                  if (ch && onNavigate) onNavigate({ type: "channel", channel: ch, messageId: m.id });

                  padding: "8px 10px", margin: "2px 0", borderRadius: 8, cursor: "pointer",

            })}

        {tab === "members" && !searching && query.trim().length >= 2 && (
          <>
            <div style={{ ...lbl, padding: "8px 6px 6px" }}>{memberResults.length} member{memberResults.length !== 1 ? "s" : ""}</div>

                <div key={uid} onClick={() => onNavigate?.({ type: "user", userId: uid })} style={{

            })}

        {/* Global user search results */}
        {tab === "users" && !searching && query.trim().length >= 2 && (
          <>
            <div style={{ ...lbl, padding: "8px 6px 6px" }}>{userResults.length} user{userResults.length !== 1 ? "s" : ""}</div>
            {userResults.length === 0 && <div style={{ textAlign: "center", padding: 20, color: T.mt, fontSize: 13 }}>No users found</div>}
            {userResults.map(u => {

                <div key={u.id} onClick={() => onNavigate?.({ type: "user", userId: u.id })} style={{

                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>

                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{u.username}</div>
                      {u.display_name && <div style={{ fontSize: 11, color: T.mt }}>{u.display_name}</div>}

                  </div>
                  {/* Shared servers */}
                  {shared.length > 0 && (
                    <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 10, color: T.mt }}>Shared:</span>
                      {shared.map(s => (

                        }}>{s.name}</div>
                      ))}
                    </div>
                  )}
                  {shared.length === 0 && (
                    <div style={{ marginTop: 4, fontSize: 10, color: T.mt, fontStyle: "italic" }}>No shared servers</div>
                  )}
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

// Highlight matching text in search results
function highlightText(text, query) {
  if (!query) return text;
  const parts = [];
  let lower = text.toLowerCase();
  let lastIdx = 0;
  let idx = lower.indexOf(query);
  while (idx !== -1 && parts.length < 20) {
    if (idx > lastIdx) parts.push(<span key={lastIdx}>{text.slice(lastIdx, idx)}</span>);
    parts.push(<span key={idx} style={{ background: "rgba(0,212,170,0.25)", color: T.ac, fontWeight: 600, borderRadius: 2, padding: "0 1px" }}>{text.slice(idx, idx + query.length)}</span>);
    lastIdx = idx + query.length;
    idx = lower.indexOf(query, lastIdx);
  }
  if (lastIdx < text.length) parts.push(<span key={lastIdx}>{text.slice(lastIdx)}</span>);
  return parts.length ? parts : text;
}

      if (wasAutoIdled.current) {

        wasAutoIdled.current = false;
        setUserStatus(prev);
        localStorage.setItem("d_status", prev);

    };

    const checkIdle = setInterval(() => {
      const current = userStatusRef.current;
      // Only auto-idle if currently online (not if manually set to idle/dnd/invisible)
      if (current === "online" && Date.now() - lastActivityRef.current > idleMs) {
        localStorage.setItem("d_status_before_idle", current);
        wasAutoIdled.current = true;
        setUserStatus("idle");
        localStorage.setItem("d_status", "idle");
      }

    window.addEventListener("mousemove", onActivity);

    window.addEventListener("touchstart", onActivity);

    return () => {
      clearInterval(checkIdle);
      window.removeEventListener("mousemove", onActivity);

  const processSlash = async (txt) => {
    const parts = txt.split(" ");
    const cmd = parts[0].toLowerCase();
    const arg1 = parts[1]; const rest = parts.slice(2).join(" ");
    if (cmd==="/ban" && arg1) {
      const t = members.find(m=>m.username?.toLowerCase()===arg1.toLowerCase());
      if (!t) return false;
      await api.banUser(curServer.id, t.user_id, rest||"No reason");
      api.listMembers(curServer.id).then(m=>{if(Array.isArray(m))setMembers(m);}); return true;
    }
    if (cmd==="/kick" && arg1) {
      const t = members.find(m=>m.username?.toLowerCase()===arg1.toLowerCase());
      if (!t) return false;
      await api.banUser(curServer.id, t.user_id, "Kicked");
      await api.unbanUser(curServer.id, t.user_id);
      api.listMembers(curServer.id).then(m=>{if(Array.isArray(m))setMembers(m);}); return true;
    }
    if (cmd==="/role" && arg1 && parts.length >= 3) {
      const roleName = parts.slice(2).join(" ");
      const t = members.find(m=>m.username?.toLowerCase()===arg1.toLowerCase());
      const r = allRoles.find(r=>r.name?.toLowerCase()===roleName.toLowerCase());
      if (t && r) {
        await handleAssignRole(t.user_id, r.id);
        return true;
      }
      return false;
    }
    if (cmd==="/audit") { setModal("server-settings"); return true; }
    if (cmd==="/settings") { setModal("server-settings"); return true; }
    if (cmd==="/invite") { const inv = await api.createInvite(curServer.id,0,168); setModal({type:"invite",data:inv}); return true; }
    if (cmd==="/emoji") { setShowInputEmoji(true); return true; }
    if (cmd==="/poll" && curChannel) {
      // Parse: /poll "Question?" "Opt1" "Opt2" ...
      const matches = txt.match(/"([^"]+)"/g);
      if (matches && matches.length >= 3) {
        const q = matches[0].replace(/"/g,"");
        const opts = matches.slice(1).map(m=>m.replace(/"/g,""));
        const result = await api.createPoll(curChannel.id, q, opts);
        if (result?.id) { loadMsgs(); }
        return true;
      }
      // Simple format: /poll Question? | Opt1 | Opt2
      const pipeMatch = rest ? (arg1 + " " + rest) : arg1;
      if (pipeMatch?.includes("|")) {
        const parts = pipeMatch.split("|").map(s=>s.trim()).filter(Boolean);
        if (parts.length >= 3) {
          const result = await api.createPoll(curChannel.id, parts[0], parts.slice(1));
          if (result?.id) { loadMsgs(); }
          return true;
        }
      }
      return false;
    }
    if (cmd==="/meeting") {
      const m = await api.createMeeting(rest||"Quick Meeting");
      if (m?.code) { setModal({type:"meeting-created",data:m}); }
      return true;
    }
    if (cmd==="/watch" && arg1 && voiceChannel) {
      const ytMatch = arg1.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
      if (ytMatch) {
        const wp = { url: arg1, videoId: ytMatch[1], startedBy: api.username, startedAt: Date.now() };
        setWatchParty(wp);
        api.ws?.send(JSON.stringify({ type:"watch_party", channel_id:voiceChannel.id, ...wp }));
        return true;
      }
      return false;
    }
    if ((cmd==="/stopwatch" || cmd==="/endwatch") && voiceChannel) {
      setWatchParty(null);
      api.ws?.send(JSON.stringify({ type:"watch_party_end", channel_id:voiceChannel.id }));
      return true;

    return false;

                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke={T.mt} strokeWidth="2.5"><path d="M13.73 21a2 2 0 01-3.46 0"/><line x1="1" y1="1" x2="23" y2="23"/></svg>

                    {ch.channel_type==="voice"&&voiceUserList(ch)}

                  ))}

            <div onClick={()=>{setCreateName("");setModal("create-channel");}} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 10px", borderRadius:6, cursor:"pointer", color:T.mt, fontSize:13, marginTop:4 }}><I.Plus /> Add Channel</div>
          </div>

          {curChannel?.channel_type==="forum" && view==="server" ? (
            React.createElement(function ForumView() {

              const [threadMsgs, setThreadMsgs] = useState([]);

              const [threadInput, setThreadInput] = useState("");

              useEffect(() => { api.listThreads(curChannel.id).then(t=>setThreads(Array.isArray(t)?t:[])); }, [curChannel?.id]);
              useEffect(() => {
                if(!curThread) return;
                api.listThreadMessages(curThread.id).then(async(msgs)=>{
                  const arr = Array.isArray(msgs)?msgs:(msgs?.messages||[]);
                  const dec = await Promise.all(arr.map(async(m)=>({...m,text:await crypt.decrypt(m.content_ciphertext,curChannel.id,0)})));
                  setThreadMsgs(dec);
                });
              }, [curThread?.id]);

              const handleCreate = async () => {
                if(!newTitle.trim()||!newBody.trim()) return;
                const ct = await crypt.encrypt(newBody.trim(), curChannel.id, 0);
                const tags = newTags.split(",").map(t=>t.trim()).filter(Boolean);
                const result = await api.createThread(curChannel.id, newTitle.trim(), ct, tags);
                if(result?.id) { setCreating(false); setNewTitle(""); setNewBody(""); setNewTags(""); api.listThreads(curChannel.id).then(t=>setThreads(Array.isArray(t)?t:[])); }
              };

              const handlePost = async () => {
                if(!threadInput.trim()||!curThread) return;
                const ct = await crypt.encrypt(threadInput.trim(), curChannel.id, 0);
                await api.postThreadMessage(curThread.id, ct);
                setThreadInput("");
                api.listThreadMessages(curThread.id).then(async(msgs)=>{
                  const arr = Array.isArray(msgs)?msgs:(msgs?.messages||[]);
                  const dec = await Promise.all(arr.map(async(m)=>({...m,text:await crypt.decrypt(m.content_ciphertext,curChannel.id,0)})));

              if(curThread) return (
                <div style={{ flex:1, display:"flex", flexDirection:"column" }}>

                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:15, fontWeight:700 }}>{curThread.title}</div>
                      <div style={{ fontSize:11, color:T.mt }}>{curThread.author_username} · {curThread.message_count} messages · {curThread.tags?.join(", ")}</div>

                  <div style={{ flex:1, overflowY:"auto", padding:"8px 16px" }}>

                      <div key={m.id} style={{ display:"flex", gap:10, padding:"6px 0", borderBottom:`1px solid ${T.bd}11` }}>

                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <span style={{ fontWeight:600, fontSize:13, color:T.tx }}>{m.author_username}</span>
                            <span style={{ fontSize:10, color:T.mt }}>{new Date(m.created_at).toLocaleString()}</span>
                          </div>
                          <div style={{ fontSize:13, color:T.tx, marginTop:2 }} dangerouslySetInnerHTML={{__html:parseMsg(m.text||"Encrypted")}} />
                        </div>
                      </div>
                    ))}
                  </div>
                  {!curThread.locked && (
                    <div style={{ padding:"10px 16px", borderTop:`1px solid ${T.bd}` }}>
                      <div style={{ display:"flex", gap:8 }}>
                        <input value={threadInput} onChange={e=>setThreadInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handlePost();}} placeholder="Reply to thread..." style={{ ...getInp(), flex:1 }} />
                        <button onClick={handlePost} disabled={!threadInput.trim()} style={{...btn(!!threadInput.trim()), width:70}}>Reply</button>
                      </div>
                    </div>
                  )}
                </div>
              );

              return (
                <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
                  <div style={{ padding:"12px 16px", borderBottom:`1px solid ${T.bd}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div style={{ fontSize:13, fontWeight:600, color:T.mt }}>{threads.length} thread{threads.length!==1?"s":""}</div>
                    <button onClick={()=>setCreating(true)} className="pill-btn" style={{ background:T.ac, color:"#000", padding:"6px 14px", fontSize:12 }}><I.Plus /> New Thread</button>
                  </div>
                  {creating && (
                    <div style={{ padding:16, borderBottom:`1px solid ${T.bd}`, background:T.sf }}>
                      <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Thread title..." style={{ ...getInp(), marginBottom:8, fontSize:15, fontWeight:600 }} autoFocus />
                      <textarea value={newBody} onChange={e=>setNewBody(e.target.value)} placeholder="Thread body (first message)..." rows={3} style={{ ...getInp(), marginBottom:8, resize:"vertical", minHeight:60 }} />
                      <input value={newTags} onChange={e=>setNewTags(e.target.value)} placeholder="Tags (comma-separated, optional)" style={{ ...getInp(), marginBottom:8 }} />
                      <div style={{ display:"flex", gap:8 }}>
                        <button onClick={handleCreate} disabled={!newTitle.trim()||!newBody.trim()} style={{...btn(!!newTitle.trim()&&!!newBody.trim())}}>Create Thread</button>
                        <button onClick={()=>setCreating(false)} className="pill-btn" style={{ background:T.sf2, color:T.mt, padding:"8px 14px" }}>Cancel</button>
                      </div>
                    </div>
                  )}
                  <div style={{ flex:1, overflowY:"auto", padding:"8px 0" }}>
                    {threads.length===0 && !creating && <div style={{ textAlign:"center", padding:40, color:T.mt }}>No threads yet. Be the first to post!</div>}
                    {threads.map(t=>(
                      <div key={t.id} onClick={()=>setCurThread(t)} style={{ display:"flex", gap:12, padding:"12px 16px", cursor:"pointer", borderBottom:`1px solid ${T.bd}11`, transition:"background .1s" }}

                        <Av name={t.author_username||"?"} size={36} url={getAvatar(t.author_id)} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                            {t.pinned && <span style={{ color:T.ac, fontSize:12 }}>📌</span>}
                            {t.locked && <span style={{ color:T.err, fontSize:12 }}>🔒</span>}
                            <span style={{ fontSize:14, fontWeight:700, color:T.tx, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.title}</span>
                          </div>
                          <div style={{ fontSize:11, color:T.mt }}>{t.author_username} · {t.message_count} replies · {new Date(t.created_at).toLocaleDateString()}</div>
                          {t.tags?.length>0 && (
                            <div style={{ display:"flex", gap:4, marginTop:4, flexWrap:"wrap" }}>
                              {t.tags.map(tag=><span key={tag} style={{ fontSize:10, padding:"1px 6px", borderRadius:4, background:`${T.ac}15`, color:T.ac, fontWeight:600 }}>{tag}</span>)}
                            </div>
                          )}
                        </div>
                        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", fontSize:10, color:T.mt, flexShrink:0 }}>
                          <span>{t.message_count}</span>
                          <I.Msg />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })
          ) : (<>
          {/* Messages */}
          <div style={{ flex:1, display:videoFullscreen?"none":"flex" }}>

                  <div style={{ flex:1, minWidth:0 }}>

                    <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
                      <span onClick={(e)=>openProfile(m.author_id,e)} onContextMenu={(e)=>{e.preventDefault();e.stopPropagation();openAuthorCtx(e,m);}} style={{ fontWeight:600, fontSize:14, color:isBotUser(m.author_id)?"#7289da":m.author_id===api.userId?T.ac:T.tx, cursor:"pointer" }}
                        onMouseEnter={ev=>ev.currentTarget.style.textDecoration="underline"}

                      {isBotUser(m.author_id) && <span style={{ fontSize:9, background:"rgba(114,137,218,0.25)", color:"#7289da", padding:"1px 5px", borderRadius:3, fontWeight:700, marginLeft:-4 }}>BOT</span>}
                      <span style={{ fontSize:11, color:T.mt }}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>

                    {editingMsg===m.id ? (
                      <div style={{ display:"flex", gap:6, marginTop:4 }}>
                        <input value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submitEdit();if(e.key==="Escape"){setEditingMsg(null);setEditText("");}}} style={{...getInp(),flex:1,fontSize:13}} autoFocus />
                        <button onClick={submitEdit} className="pill-btn" style={{ background:T.ac, color:"#000", fontSize:11 }}>Save</button>

                      </div>

                      <span dangerouslySetInnerHTML={{__html:parseMsg(m.text.replace(/\[file:[a-f0-9-]+\]/g,""))}} />

                        return fid?<FileAttachment key={i} fileId={fid} />:null;
                      })}
                      <LinkEmbed text={m.text} />
                    </div> : <div style={{ fontSize:13, color:T.mt, fontStyle:"italic" }}>encrypted (old key)</div>}
                    {/* Reaction badges */}
                    {reactions[m.id]?.length > 0 && (
                      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:4 }}>
                        {reactions[m.id].map(rx=>(
                          <div key={rx.emoji} onClick={()=>handleReact(m, rx.emoji)}
                            style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"2px 8px", borderRadius:12,
                              background:rx.me?"rgba(0,212,170,0.15)":T.sf2, border:`1px solid ${rx.me?T.ac:T.bd}`,
                              cursor:"pointer", fontSize:13, transition:"all .15s", userSelect:"none" }}
                            onMouseEnter={ev=>ev.currentTarget.style.borderColor=T.ac}
                            onMouseLeave={ev=>{if(!rx.me)ev.currentTarget.style.borderColor=T.bd;}}>
                            <span>{rx.emoji}</span>
                            <span style={{ fontSize:11, fontWeight:600, color:rx.me?T.ac:T.mt }}>{rx.count}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  {hoveredMsg===m.id&&!editingMsg&&(
                    <div style={{ position:"absolute", top:-6, right:16, display:"flex", gap:1, background:T.sf, border:`1px solid ${T.bd}`, borderRadius:6, padding:2, boxShadow:"0 2px 8px rgba(0,0,0,0.3)", zIndex:10 }}>
                      <div style={{ position:"relative" }}>
                        <div onClick={()=>setEmojiTarget(emojiTarget===m.id?null:m.id)} style={{ width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:4, cursor:"pointer", color:T.mt }} title="React"
                          onMouseEnter={ev=>ev.currentTarget.style.background="rgba(255,255,255,0.06)"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}><I.Smile /></div>
                        {emojiTarget===m.id&&<EmojiPicker onSelect={(e)=>handleReact(m,e)} onClose={()=>setEmojiTarget(null)} />}

                        onMouseEnter={ev=>ev.currentTarget.style.background="rgba(255,71,87,0.08)"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}><I.Trash /></div>}
                    </div>
                  )}
                </div>
              ))}
              <div ref={endRef} />

                {allRoles.filter(r=>r.name!=="@everyone").map(role=>{
