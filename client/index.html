const { useState, useEffect, useRef, useCallback, useMemo } = React;

// Global confirm dialog state (replaces browser confirm())
let _confirmResolve = null;
function showConfirm(title, message, danger=false, dismissKey=null) {
  // If dismissKey is set and user previously chose "don't show again", auto-resolve true
  if (dismissKey && localStorage.getItem("d_dismiss_"+dismissKey)==="true") return Promise.resolve(true);
  return new Promise(resolve => {
    _confirmResolve = resolve;
    window._setConfirmDialog?.({ title, message, danger, dismissKey, open: true });
  });
}

const API_BASE = window.location.origin + "/api/v1";
const WS_BASE = window.location.origin.replace(/^http/, "ws");

// ═══════════════════════════════════════════════════════════
// API Client
// ═══════════════════════════════════════════════════════════
class CitadelAPI {
  constructor() {
    this.token = localStorage.getItem("d_tok") || null;
    this.refreshToken = localStorage.getItem("d_ref") || null;
    this.userId = localStorage.getItem("d_uid") || null;
    this.username = localStorage.getItem("d_uname") || null;
    this.ws = null; this.wsListeners = new Set(); this._userCache = {};
  }
  setAuth(access, refresh, userId, username) {
    this.token = access; this.refreshToken = refresh;
    this.userId = userId; this.username = username || userId;
    localStorage.setItem("d_tok", access); localStorage.setItem("d_ref", refresh);
    localStorage.setItem("d_uid", userId);
    if (username) localStorage.setItem("d_uname", username);
  }
  clearAuth() {
    this.token = null; this.refreshToken = null; this.userId = null; this.username = null;
    ["d_tok","d_ref","d_uid","d_uname"].forEach(k => localStorage.removeItem(k));
    this.disconnectWs();
  }
  async fetch(path, opts = {}) {
    const headers = { "Content-Type": "application/json", ...opts.headers };
    if (this.token) headers["Authorization"] = `Bearer ${this.token}`;
    const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
    if (res.status === 401 && this.refreshToken) {
      const ok = await this.tryRefresh();
      if (ok) { headers["Authorization"] = `Bearer ${this.token}`; return fetch(`${API_BASE}${path}`, { ...opts, headers }); }
    }
    return res;
  }
  async tryRefresh() {
    try {
      const res = await fetch(`${API_BASE}/auth/refresh`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ refresh_token: this.refreshToken }) });
      if (res.ok) { const d = await res.json(); this.token = d.access_token; localStorage.setItem("d_tok", this.token); return true; }
    } catch {} this.clearAuth(); return false;
  }
  // Auth
  async register(u, p, e) { const res = await fetch(`${API_BASE}/auth/register`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p, email: e || undefined, device_name: "web" }) }); const d = await res.json(); if (res.ok) this.setAuth(d.access_token, d.refresh_token, d.user.id, d.user.username); return { ok: res.ok, data: d }; }
  async login(u, p) { const res = await fetch(`${API_BASE}/auth/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ login: u, password: p, device_name: "web" }) }); const d = await res.json(); if (res.ok) this.setAuth(d.access_token, d.refresh_token, d.user.id, d.user.username); return { ok: res.ok, data: d }; }
  async logout() { await this.fetch("/auth/logout", { method: "POST" }); this.clearAuth(); }
  // Servers
  async listServers() { return (await this.fetch("/servers")).json(); }
  async createServer(name) { return (await this.fetch("/servers", { method: "POST", body: JSON.stringify({ name }) })).json(); }
  async createInvite(sid) { return (await this.fetch(`/servers/${sid}/invites`, { method: "POST", body: JSON.stringify({ max_uses: 100, expires_in_hours: 168 }) })).json(); }
  async joinServer(sid, code) { return this.fetch(`/servers/${sid}/join`, { method: "POST", body: JSON.stringify({ invite_code: code }) }); }
  async listMembers(sid) { return (await this.fetch(`/servers/${sid}/members`)).json(); }
  // Channels + Categories
  async listChannels(sid) { return (await this.fetch(`/servers/${sid}/channels`)).json(); }
  async createChannel(sid, name, catId, chType) { return (await this.fetch(`/servers/${sid}/channels`, { method: "POST", body: JSON.stringify({ name, channel_type: chType||"text", category_id: catId || undefined }) })).json(); }
  async listCategories(sid) { try { const r = await this.fetch(`/servers/${sid}/categories`); if (!r.ok) return []; return r.json(); } catch { return []; } }
  // Messages
  async sendMessage(cid, ct, ep, replyId) { return (await this.fetch(`/channels/${cid}/messages`, { method: "POST", body: JSON.stringify({ content_ciphertext: ct, mls_epoch: ep, reply_to_id: replyId||undefined }) })).json(); }
  async getMessages(cid, limit = 50) { return (await this.fetch(`/channels/${cid}/messages?limit=${limit}`)).json(); }

  async pinMessage(sid, cid, mid) { return this.fetch(`/servers/${sid}/channels/${cid}/pins/${mid}`, { method:"POST" }); }
  async unpinMessage(sid, cid, mid) { return this.fetch(`/servers/${sid}/channels/${cid}/pins/${mid}`, { method:"DELETE" }); }
  // Roles
  async listRoles(sid) { try { const r = await this.fetch(`/servers/${sid}/roles`); return r.ok ? r.json() : []; } catch { return []; } }
  async createRole(sid, name, color, permissions) { return this.fetch(`/servers/${sid}/roles`, { method:"POST", body:JSON.stringify({name,color,permissions}) }); }

  async deleteRole(sid, rid) { return this.fetch(`/roles/${rid}`, { method:"DELETE" }); }
  async downloadFile(fid) { return (await this.fetch(`/files/${fid}`)).json(); }

  async unassignRole(sid, uid, rid) { return this.fetch(`/servers/${sid}/members/${uid}/roles/${rid}`, { method:"DELETE" }); }
  async listMemberRoles(sid, uid) { try { const r = await this.fetch(`/servers/${sid}/members/${uid}/roles`); return r.ok ? r.json() : []; } catch { return []; } }
  // Bans
  async listBans(sid) { try { const r = await this.fetch(`/servers/${sid}/bans`); return r.ok ? r.json() : []; } catch { return []; } }
  async banUser(sid, uid, reason) { return this.fetch(`/servers/${sid}/bans`, { method:"POST", body:JSON.stringify({user_id:uid, reason:reason||null}) }); }
  async unbanUser(sid, uid) { return this.fetch(`/servers/${sid}/bans/${uid}`, { method:"DELETE" }); }
  async kickMember(sid, uid) { return this.fetch(`/servers/${sid}/members/${uid}`, { method:"DELETE" }); }

  async getAuditLog(sid, limit=50) { try { const r = await this.fetch(`/servers/${sid}/audit-log?limit=${limit}`); return r.ok ? r.json() : []; } catch { return []; } }

  async deleteEmoji(sid, eid) { return this.fetch(`/servers/${sid}/emojis/${eid}`, { method:"DELETE" }); }

  async createThread(cid, title, ct, tags=[]) { return (await this.fetch(`/channels/${cid}/threads`, { method:"POST", body: JSON.stringify({ title, content_ciphertext: ct, tags }) })).json(); }
  async getThread(tid) { return (await this.fetch(`/threads/${tid}`)).json(); }
  async updateThread(tid, data) { return this.fetch(`/threads/${tid}`, { method:"PATCH", body: JSON.stringify(data) }); }
  async deleteThread(tid) { return this.fetch(`/threads/${tid}`, { method:"DELETE" }); }
  async listThreadMessages(tid, limit=50) { return (await this.fetch(`/threads/${tid}/messages?limit=${limit}`)).json(); }
  async postThreadMessage(tid, ct, replyId) { return (await this.fetch(`/threads/${tid}/messages`, { method:"POST", body: JSON.stringify({ content_ciphertext: ct, reply_to_id: replyId||undefined }) })).json(); }
  // Events
  async listEvents(sid) { try { const r = await this.fetch(`/servers/${sid}/events`); return r.ok ? r.json() : []; } catch { return []; } }
  async createEvent(sid, data) { return (await this.fetch(`/servers/${sid}/events`, { method:"POST", body: JSON.stringify(data) })).json(); }
  async updateEvent(eid, data) { return this.fetch(`/events/${eid}`, { method:"PATCH", body: JSON.stringify(data) }); }
  async deleteEvent(eid) { return this.fetch(`/events/${eid}`, { method:"DELETE" }); }
  async rsvpEvent(eid, status) { return (await this.fetch(`/events/${eid}/rsvp`, { method:"POST", body: JSON.stringify({ status }) })).json(); }
  // Discovery
  async discoverServers(search, category, limit=50) { const p = new URLSearchParams(); if(search) p.set("search",search); if(category) p.set("category",category); p.set("limit",limit); try { const r = await this.fetch(`/discover?${p}`); return r.ok ? r.json() : []; } catch { return []; } }
  async publishServer(sid, category, tags) { return this.fetch(`/servers/${sid}/publish`, { method:"POST", body: JSON.stringify({ category, tags }) }); }
  async unpublishServer(sid) { return this.fetch(`/servers/${sid}/unpublish`, { method:"POST" }); }
  // Account
  async deleteAccount() { return this.fetch(`/users/@me`, { method:"DELETE" }); }
  // Guest + Upgrade
  async registerGuest() { const r = await fetch(API_BASE+"/auth/guest",{method:"POST",headers:{"Content-Type":"application/json"}}); const d = await r.json(); if(r.ok && d.access_token){this.token=d.access_token;this.userId=d.user.id;this.username=d.user.username;localStorage.setItem("d_tok",this.token);} return {ok:r.ok, data:d}; }
  async upgradeAccount(username, password, email) { return (await this.fetch(`/auth/upgrade`, { method:"POST", body: JSON.stringify({ username:username||undefined, password:password||undefined, email:email||undefined }) })).json(); }
  // AI Bot Spawn (Patent-Pending)
  async listBotPersonas() { try { const r = await this.fetch(`/bots/personas`); return r.ok ? r.json() : []; } catch { return []; } }
  async spawnBot(persona, topic) { return (await this.fetch(`/bots/spawn`, { method:"POST", body: JSON.stringify({ persona, topic:topic||undefined }) })).json(); }
  async listBotChannels() { try { const r = await this.fetch(`/bots/channels`); return r.ok ? r.json() : []; } catch { return []; } }

  async listServerBots(sid) { try { const r = await this.fetch(`/servers/${sid}/ai-bots`); return r.ok ? r.json() : []; } catch { return []; } }
  async addBotToServer(sid, persona, name) { return (await this.fetch(`/servers/${sid}/ai-bots`, { method:"POST", body: JSON.stringify({ persona, display_name:name||undefined }) })).json(); }

  async removeBotFromServer(sid, bid) { return this.fetch(`/servers/${sid}/ai-bots/${bid}`, { method:"DELETE" }); }

  async createPoll(cid, question, options, allowMultiple, anonymous, durationMin) { return (await this.fetch(`/channels/${cid}/polls`, { method:"POST", body: JSON.stringify({ question, options, allow_multiple:allowMultiple, anonymous, duration_minutes:durationMin||undefined }) })).json(); }

  async getAuditEntry(sid, entryId) { try { const r = await this.fetch(`/servers/${sid}/audit-log/${entryId}`); return r.ok ? r.json() : null; } catch { return null; } }
  // Reactions
  async addReaction(cid, mid, emoji) { return this.fetch(`/channels/${cid}/messages/${mid}/reactions/${encodeURIComponent(emoji)}`, { method:"PUT" }); }
  async removeReaction(cid, mid, emoji) { return this.fetch(`/channels/${cid}/messages/${mid}/reactions/${encodeURIComponent(emoji)}`, { method:"DELETE" }); }
  async listReactions(cid, mid) { try { const r = await this.fetch(`/channels/${cid}/messages/${mid}/reactions`); return r.ok ? r.json() : []; } catch { return []; } }
  // Typing
  async startTyping(sid, cid) { try { await this.fetch(`/servers/${sid}/channels/${cid}/typing`, { method:"POST" }); } catch {} }
  // Files
  async uploadFile(channelId, file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const base64 = reader.result.split(",")[1]; // strip data:...;base64,
          const r = await this.fetch(`/channels/${channelId}/files`, {
            method: "POST",
            body: JSON.stringify({
              encrypted_blob: base64,
              mime_type_hint: file.type || "application/octet-stream",
              filename: file.name,
            }),
          });
          if(!r.ok) { const err = await r.text().catch(()=>""); reject(new Error(`Upload failed (${r.status}): ${err}`)); return; }
          const data = await r.json();
          resolve(data);
        } catch (err) { reject(err); }
      };
      reader.onerror = () => reject(new Error("Failed to read file"));
      reader.readAsDataURL(file);
    });
  }
  async uploadDmFile(dmId, file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const base64 = reader.result.split(",")[1];
          const r = await this.fetch(`/dms/${dmId}/files`, {
            method: "POST",
            body: JSON.stringify({ encrypted_blob: base64, mime_type_hint: file.type || "application/octet-stream", filename: file.name }),
          });
          resolve(await r.json());
        } catch (err) { reject(err); }
      };
      reader.onerror = () => reject(new Error("Failed to read file"));
      reader.readAsDataURL(file);
    });
  }
  async deleteFile(fileId) { return this.fetch(`/files/${fileId}`, { method: "DELETE" }); }

// Notification Sounds (Web Audio API — no external files needed)
// ═══════════════════════════════════════════════════════════
const notifSound = {
  _ctx: null,
  _getCtx() { if(!this._ctx) this._ctx = new (window.AudioContext||window.webkitAudioContext)(); return this._ctx; },
  play(type) {
    if (localStorage.getItem("d_mute_sounds")==="true") return;
    try {
      const ctx = this._getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const vol = parseFloat(localStorage.getItem("d_notif_vol")||"0.3");
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      if (type === "message") {
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime+0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.15);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.15);
      } else if (type === "mention") {
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.setValueAtTime(880, ctx.currentTime+0.08);
        osc.frequency.setValueAtTime(1100, ctx.currentTime+0.16);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.3);
      } else if (type === "join") {
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.setValueAtTime(660, ctx.currentTime+0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.2);
      } else if (type === "leave") {
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.setValueAtTime(440, ctx.currentTime+0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.2);
      } else if (type === "call") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.setValueAtTime(550, ctx.currentTime+0.2);
        osc.frequency.setValueAtTime(440, ctx.currentTime+0.4);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.6);
      }
    } catch {}
  }
};

// ═══════════════════════════════════════════════════════════
// Crypto Engine (placeholder — Phase 4 replaces with OpenMLS)
// ═══════════════════════════════════════════════════════════
class CryptoEngine {
  constructor() { this.keys = new Map(); this.fp = ""; }
  async init() {
    const id = await crypto.subtle.generateKey({ name: "ECDSA", namedCurve: "P-256" }, true, ["sign", "verify"]);
    const raw = await crypto.subtle.exportKey("raw", id.publicKey);
    this.fp = Array.from(new Uint8Array(raw).slice(0, 8)).map(b => b.toString(16).padStart(2, "0")).join(":");
    return this.fp;
  }
  async deriveKey(cid, ep = 0) {
    const enc = new TextEncoder();
    const mat = await crypto.subtle.importKey("raw", enc.encode(`discreet:${cid}:${ep}`), { name: "PBKDF2" }, false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt: enc.encode("mls-group-secret"), iterations: 100000, hash: "SHA-256" }, mat, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    this.keys.set(`${cid}:${ep}`, key); return key;
  }
  async encrypt(text, cid, ep = 0) {
    let key = this.keys.get(`${cid}:${ep}`) || await this.deriveKey(cid, ep);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv, tagLength: 128 }, key, new TextEncoder().encode(text));
    const buf = new Uint8Array(12 + ct.byteLength); buf.set(iv); buf.set(new Uint8Array(ct), 12);
    return btoa(String.fromCharCode(...buf));
  }
  async decrypt(b64, cid, ep = 0) {
    try { let key = this.keys.get(`${cid}:${ep}`) || await this.deriveKey(cid, ep); const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0)); const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: data.slice(0, 12), tagLength: 128 }, key, data.slice(12)); return new TextDecoder().decode(pt); } catch { return null; }
  }
  async deriveKeyBytes(cid, ep = 0) {
    const enc = new TextEncoder();
    const mat = await crypto.subtle.importKey("raw", enc.encode(`discreet:${cid}:${ep}`), { name: "PBKDF2" }, false, ["deriveBits"]);
    const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: enc.encode("mls-group-secret"), iterations: 100000, hash: "SHA-256" }, mat, 256);
    return new Uint8Array(bits);
  }
}

// ═══════════════════════════════════════════════════════════
// Message Parser
// ═══════════════════════════════════════════════════════════
function parseMsg(text) {
  if (!text) return "";
  let s = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s = s.replace(/```([^`]+)```/g, '<pre style="background:#0d1017;padding:8px 10px;border-radius:6px;margin:4px 0;font-family:JetBrains Mono,monospace;font-size:12px;overflow-x:auto"><code>$1</code></pre>');
  s = s.replace(/`([^`]+)`/g, '<code style="background:#181c2a;padding:1px 5px;border-radius:3px;font-family:JetBrains Mono,monospace;font-size:12px">$1</code>');
  s = s.replace(/\|\|([^|]+)\|\|/g, '<span style="background:#181c2a;color:#181c2a;border-radius:3px;padding:0 3px;cursor:pointer" onclick="this.style.color=\'#dde0ea\'">$1</span>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/__(.+?)__/g, '<u>$1</u>');
  s = s.replace(/~~(.+?)~~/g, '<s>$1</s>');
  // @mention highlighting — matches @username or @display name
  s = s.replace(/@(\w[\w.-]{0,31})/g, '<span class="mention-tag" data-mention="$1" style="background:rgba(0,212,170,0.15);color:#00d4aa;padding:0 2px;border-radius:3px;font-weight:600;cursor:pointer">@$1</span>');
  // Custom :emoji_name: rendering
  s = s.replace(/:([a-z0-9_]{1,32}):/g, (match, name) => {
    const emojis = window._customEmojis || [];
    const emoji = emojis.find(e => e.name === name);
    if (emoji) return `<img src="${emoji.image_url}" alt=":${name}:" title=":${name}:" style="width:22px;height:22px;vertical-align:middle;display:inline" />`;
    return match;
  });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => { const u = url.trim().toLowerCase(); if (u.startsWith("javascript:") || u.startsWith("data:") || u.startsWith("vbscript:")) return text; return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#00d4aa">${text}</a>`; });
  // GIF/image URLs — render inline before generic URL linking
  s = s.replace(/(https?:\/\/[^\s<]+\.(?:gif|gifv|webp)(?:\?[^\s<]*)?)/gi, (m) => localStorage.getItem("d_show_gifs")!=="false" ? `<img src="${m}" style="max-width:300px;max-height:200px;border-radius:8px;margin:4px 0;display:block;cursor:pointer" loading="lazy" />` : `<a href="${m}" target="_blank" rel="noopener noreferrer" style="color:#00d4aa">[GIF]</a>`);
  // Static image URLs
  s = s.replace(/(https?:\/\/[^\s<]+\.(?:jpg|jpeg|png|bmp|svg)(?:\?[^\s<]*)?)/gi, (m) => { if(s.includes('src="'+m)) return m; return localStorage.getItem("d_show_images")!=="false" ? `<img src="${m}" style="max-width:400px;max-height:300px;border-radius:8px;margin:4px 0;display:block;cursor:pointer" loading="lazy" />` : `<a href="${m}" target="_blank" rel="noopener noreferrer" style="color:#00d4aa">[Image]</a>`; });
  // Video URLs — inline player with VLC-like controls
  s = s.replace(/(https?:\/\/[^\s<]+\.(?:mp4|webm|mov|ogg|m4v)(?:\?[^\s<]*)?)/gi, (m) => { if(s.includes('src="'+m)) return m; return localStorage.getItem("d_show_videos")!=="false" ? `<video src="${m}" controls preload="metadata" style="max-width:400px;max-height:300px;border-radius:8px;margin:4px 0;display:block" controlslist="nodownload"></video>` : `<a href="${m}" target="_blank" rel="noopener noreferrer" style="color:#00d4aa">[Video]</a>`; });
  s = s.replace(/(https?:\/\/media\.tenor\.com\/[^\s<]+)/g, (m) => { if(s.includes('src="'+m)) return m; return localStorage.getItem("d_show_gifs")!=="false" ? `<img src="${m}" style="max-width:300px;max-height:200px;border-radius:8px;margin:4px 0;display:block;cursor:pointer" loading="lazy" />` : `<a href="${m}" target="_blank" rel="noopener noreferrer" style="color:#00d4aa">[GIF]</a>`; });
  s = s.replace(/(https?:\/\/[^\s<]+)/g, (m) => { if(s.includes('src="'+m) || s.includes('href="'+m)) return m; return `<a href="${m}" target="_blank" rel="noopener noreferrer" style="color:#00d4aa">${m}</a>`; });
  s = s.replace(/^&gt; (.+)$/gm, '<div style="border-left:3px solid #181c2a;padding-left:10px;color:#8a90b0;margin:2px 0">$1</div>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

// Global long-press → contextmenu converter for mobile
// + Safe delegated image click handler → lightbox
document.addEventListener("click", (e) => {
  const img = e.target.closest("img[style*='cursor:pointer']");
  if (img && img.src) {
    e.preventDefault();
    window.dispatchEvent(new CustomEvent("citadel-lightbox", { detail: { src: img.src } }));
  }
});
// Dispatches a native contextmenu event on any long-press (500ms)
// All onContextMenu handlers automatically work on touch devices
// ═══════════════════════════════════════════════════════════
(function initLongPress() {
  let timer = null, startPos = null, el = null;
  document.addEventListener("touchstart", (e) => {
    el = e.target;
    startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    timer = setTimeout(() => {
      // Prevent ghost clicks
      e.preventDefault();
      // Dispatch a real contextmenu event
      const ctxEvt = new MouseEvent("contextmenu", {
        bubbles: true, cancelable: true,
        clientX: startPos.x, clientY: startPos.y,
      });
      el.dispatchEvent(ctxEvt);
      timer = null;
    }, 500);
  }, { passive: false });
  document.addEventListener("touchmove", (e) => {
    if (!timer || !startPos) return;
    const dx = Math.abs(e.touches[0].clientX - startPos.x);
    const dy = Math.abs(e.touches[0].clientY - startPos.y);
    if (dx > 10 || dy > 10) { clearTimeout(timer); timer = null; }
  });
  document.addEventListener("touchend", () => { if(timer) { clearTimeout(timer); timer = null; } });
  document.addEventListener("touchcancel", () => { if(timer) { clearTimeout(timer); timer = null; } });
})();

// ═══════════════════════════════════════════════════════════
// Voice Engine — WebRTC peer-to-peer with VAD + Push-to-Talk
// ═══════════════════════════════════════════════════════════
class VoiceEngine {
  constructor() {
    this.peers = new Map();
    this.streams = new Map();
    this.localStream = null;
    this.videoStream = null;
    this.screenStream = null;
    this.audioCtx = null;
    this.analyser = null;
    this.gainNode = null;
    this.eqNodes = {};
    this.channelId = null;
    this.mode = localStorage.getItem("d_vmode")||"vad";
    this.sensitivity = parseFloat(localStorage.getItem("d_vsens")||"0.02");
    this.muted = false;
    this.deafened = false;
    this.speaking = false;
    this.videoEnabled = false;
    this.screenSharing = false;
    this.inputGain = parseInt(localStorage.getItem("d_inputVol")||"100")/100;
    this.outputGain = parseInt(localStorage.getItem("d_outputVol")||"100")/100;
    this.noiseSuppression = localStorage.getItem("d_noiseSup")!=="false";
    this.echoCancellation = localStorage.getItem("d_echoCan")!=="false";
    this.autoGainControl = localStorage.getItem("d_agc")!=="false";
    this.sframeActive = false;
    this.peerKeyIds = new Map();
    this._sframeCrypto = new CryptoEngine();
    this._sframeKey = null;
    this._sframePrevKey = null;
    this._sframeOverlapTimer = null;
    this._sframeCounter = 0;
    this._sframeWorker = null;
    this._sframePCs = new Map();
    this._sframeSupportMode = null;
    this.pttKey = localStorage.getItem("d_pttkey")||"`";
    this.pttDown = false;
    this.listeners = new Set();
    this._vadLoop = null;
    this._onKeyDown = (e) => { if(this.mode==="ptt"&&e.key===this.pttKey&&!this.pttDown){this.pttDown=true;this._setMicEnabled(true);} };
    this._onKeyUp = (e) => { if(this.mode==="ptt"&&e.key===this.pttKey){this.pttDown=false;this._setMicEnabled(false);} };
  }
  emit(type, data) { this.listeners.forEach(fn=>fn({type,...data})); }
  onEvent(fn) { this.listeners.add(fn); return ()=>this.listeners.delete(fn); }
  async join(channelId) {
    this.channelId = channelId;
    try {
      const deviceId = localStorage.getItem("d_audioIn");
      const constraints = {audio:{echoCancellation:this.echoCancellation,noiseSuppression:this.noiseSuppression,autoGainControl:this.autoGainControl,...(deviceId&&deviceId!=="default"?{deviceId:{exact:deviceId}}:{})}};
      this.localStream = await navigator.mediaDevices.getUserMedia(constraints);
      this.audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const src = this.audioCtx.createMediaStreamSource(this.localStream);
      this.gainNode = this.audioCtx.createGain();
      this.gainNode.gain.value = this.inputGain;
      // 5-band EQ
      const freqs = [60,250,1000,4000,16000];
      let lastNode = src;
      freqs.forEach(f=>{
        const eq = this.audioCtx.createBiquadFilter();
        eq.type = f===60?"lowshelf":f===16000?"highshelf":"peaking";
        eq.frequency.value = f;
        eq.gain.value = parseFloat(localStorage.getItem("d_eq_"+(f>=1000?(f/1000)+"k":f))||"0");
        eq.Q.value = 1.4;
        lastNode.connect(eq);
        this.eqNodes[f] = eq;
        lastNode = eq;
      });
      lastNode.connect(this.gainNode);
      this.analyser = this.audioCtx.createAnalyser();
      this.analyser.fftSize = 512;
      this.gainNode.connect(this.analyser);
      this._startVAD();
      if(this.mode==="ptt") this._setMicEnabled(false);
      document.addEventListener("keydown",this._onKeyDown);
      document.addEventListener("keyup",this._onKeyUp);
      this.emit("joined",{channelId});
      return true;
    } catch(err) { console.error("Mic denied:",err); this.emit("error",{message:"Microphone access denied"}); return false; }
  }
  leave() {
    this._sframeCleanup();
    this.peers.forEach(pc=>pc.close()); this.peers.clear(); this.streams.clear();
    if(this.localStream){this.localStream.getTracks().forEach(t=>t.stop());this.localStream=null;}
    if(this.videoStream){this.videoStream.getTracks().forEach(t=>t.stop());this.videoStream=null;this.videoEnabled=false;}
    if(this.screenStream){this.screenStream.getTracks().forEach(t=>t.stop());this.screenStream=null;this.screenSharing=false;}
    if(this.audioCtx){this.audioCtx.close();this.audioCtx=null;}
    if(this._vadLoop){cancelAnimationFrame(this._vadLoop);this._vadLoop=null;}
    document.removeEventListener("keydown",this._onKeyDown);
    document.removeEventListener("keyup",this._onKeyUp);
    this.channelId=null; this.speaking=false;
    this.emit("left",{});
  }
  toggleMute() { this.muted=!this.muted; this._setMicEnabled(!this.muted); this.emit("mute_changed",{muted:this.muted}); }
  toggleDeafen() {
    this.deafened=!this.deafened;
    this.streams.forEach(s=>s.getAudioTracks().forEach(t=>{t.enabled=!this.deafened;}));
    if(this.deafened&&!this.muted){this.muted=true;this._setMicEnabled(false);}
    if(!this.deafened&&this.muted){this.muted=false;this._setMicEnabled(true);}
    this.emit("deafen_changed",{deafened:this.deafened,muted:this.muted});
  }
  _setMicEnabled(on) { if(this.localStream) this.localStream.getAudioTracks().forEach(t=>{t.enabled=on&&!this.muted;}); }
  setEQ(freq, gain) {
    const freqMap={"60":60,"250":250,"1k":1000,"4k":4000,"16k":16000};
    const f=freqMap[freq]||parseInt(freq);
    if(this.eqNodes[f]) this.eqNodes[f].gain.value = gain;
  }
  setInputDevice(deviceId) {
    localStorage.setItem("d_audioIn", deviceId);
    // Will apply on next join
  }
  setOutputDevice(deviceId) {
    localStorage.setItem("d_audioOut", deviceId);
    // Apply to all peer audio elements
    document.querySelectorAll("audio[id^='voice-'],video[id^='video-']").forEach(el=>{
      if(el.setSinkId) el.setSinkId(deviceId).catch(()=>{});
    });
  }
  async startVideo() {
    try {
      const camId = localStorage.getItem("d_videoIn");
      const constraints = {video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30},...(camId&&camId!=="default"?{deviceId:{exact:camId}}:{})}};
      this.videoStream = await navigator.mediaDevices.getUserMedia(constraints);
      this.videoEnabled = true;
      // Add video tracks to all existing peer connections
      this.videoStream.getVideoTracks().forEach(track=>{
        this.peers.forEach(pc=>pc.addTrack(track, this.videoStream));
      });
      this.emit("video_started",{stream:this.videoStream});
      return this.videoStream;
    } catch(err) { console.error("Camera denied:",err); this.emit("error",{message:"Camera access denied"}); return null; }
  }
  stopVideo() {
    if(this.videoStream) { this.videoStream.getTracks().forEach(t=>t.stop()); this.videoStream=null; }
    this.videoEnabled = false;
    this.emit("video_stopped",{});
  }
  async startScreenShare() {
    try {
      this.screenStream = await navigator.mediaDevices.getDisplayMedia({video:{cursor:"always"},audio:true});
      this.screenSharing = true;
      this.screenStream.getVideoTracks()[0].onended = ()=>this.stopScreenShare();
      this.screenStream.getTracks().forEach(track=>{
        this.peers.forEach(pc=>pc.addTrack(track, this.screenStream));
      });
      this.emit("screen_started",{stream:this.screenStream});
      return this.screenStream;
    } catch(err) { console.error("Screen share denied:",err); return null; }
  }
  stopScreenShare() {
    if(this.screenStream) { this.screenStream.getTracks().forEach(t=>t.stop()); this.screenStream=null; }
    this.screenSharing = false;
    this.emit("screen_stopped",{});
  }
  _startVAD() {
    const data = new Uint8Array(this.analyser.frequencyBinCount);
    const check = () => {
      if(!this.analyser) return;
      this.analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0)/data.length/255;
      const was = this.speaking;
      if(this.mode==="vad"){this.speaking=avg>this.sensitivity&&!this.muted;if(this.speaking!==was)this.emit("speaking_changed",{speaking:this.speaking,level:avg});}
      else{this.speaking=this.pttDown&&!this.muted;}
      this.emit("level",{level:avg});
      this._vadLoop = requestAnimationFrame(check);
    };
    check();
  }
  async createOffer(pid) { const pc=this._getOrCreatePeer(pid); const o=await pc.createOffer(); await pc.setLocalDescription(o); return o; }
  async handleOffer(pid,offer) { const pc=this._getOrCreatePeer(pid); await pc.setRemoteDescription(new RTCSessionDescription(offer)); const a=await pc.createAnswer(); await pc.setLocalDescription(a); return a; }
  async handleAnswer(pid,answer) { const pc=this.peers.get(pid); if(pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); }
  async handleIceCandidate(pid,candidate) { const pc=this.peers.get(pid); if(pc&&candidate) await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
  _getOrCreatePeer(pid) {
    if(this.peers.has(pid)) return this.peers.get(pid);
    const pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]});
    if(this.localStream) this.localStream.getTracks().forEach(t=>pc.addTrack(t,this.localStream));
    pc.ontrack = (e)=>{
      const stream=e.streams[0]||new MediaStream([e.track]);
      if(e.track.kind==="video"){
        this.emit("peer_video",{peerId:pid,stream,track:e.track});
      } else {
        this.streams.set(pid,stream);
        const outDev = localStorage.getItem("d_audioOut");
        const audio=new Audio(); audio.srcObject=stream; audio.autoplay=true; audio.id=`voice-${pid}`;
        audio.volume = this.outputGain;
        if(outDev && outDev!=="default" && audio.setSinkId) audio.setSinkId(outDev).catch(()=>{});
        document.body.appendChild(audio);
        this.emit("peer_stream",{peerId:pid,stream});
      }
    };
    pc.onicecandidate=(e)=>{if(e.candidate)this.emit("ice_candidate",{peerId:pid,candidate:e.candidate});};
    pc.onconnectionstatechange=()=>{if(pc.connectionState==="disconnected"||pc.connectionState==="failed")this._removePeer(pid);};
    this.peers.set(pid,pc);
    this._setupSFrame(pc);
    return pc;
  }
  _removePeer(pid) { const pc=this.peers.get(pid);if(pc)pc.close();this.peers.delete(pid);this.streams.delete(pid);const el=document.getElementById(`voice-${pid}`);if(el)el.remove();this.emit("peer_left",{peerId:pid}); }
  handleSFrameKeyUpdate(userId, keyId, epoch) {
    const MAX_U64 = 0xFFFFFFFFFFFFFFFF;
    if(epoch===MAX_U64||epoch===-1){this.peerKeyIds.delete(userId);}
    else{this.peerKeyIds.set(userId,keyId);}
  }
  // ── SFrame (RFC 9605) integration ──────────────────────
  _sframeIsSupported() {
    if(this._sframeSupportMode!==null) return this._sframeSupportMode;
    if(typeof RTCRtpScriptTransform!=="undefined") this._sframeSupportMode="script-transform";
    else if(typeof RTCRtpSender!=="undefined"&&"createEncodedStreams" in RTCRtpSender.prototype) this._sframeSupportMode="encoded-streams";
    else this._sframeSupportMode="none";
    return this._sframeSupportMode;
  }
  async _sframeImportKey(raw) {
    return crypto.subtle.importKey("raw",raw,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
  }
  async _sframeRotateKey(rawBytes) {
    const newKey = await this._sframeImportKey(rawBytes);
    if(this._sframeKey){
      this._sframePrevKey=this._sframeKey;
      if(this._sframeOverlapTimer) clearTimeout(this._sframeOverlapTimer);
      this._sframeOverlapTimer=setTimeout(()=>{this._sframePrevKey=null;this._sframeOverlapTimer=null;},2000);
    }
    this._sframeKey=newKey;
    this._sframeCounter=0;
    if(this._sframeWorker&&this._sframeSupportMode==="script-transform"){
      const copy=rawBytes.slice();
      this._sframeWorker.postMessage({type:"key",key:copy.buffer},[copy.buffer]);
    }
  }
  async _sframeEncryptFrame(frame,controller) {
    if(!this._sframeKey){controller.enqueue(frame);return;}
    try{
      const data=new Uint8Array(frame.data);
      const iv=new Uint8Array(12);
      crypto.getRandomValues(iv.subarray(0,8));
      new DataView(iv.buffer).setUint32(8,this._sframeCounter++);
      const ct=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv,additionalData:new Uint8Array(0)},this._sframeKey,data));
      const out=new Uint8Array(12+ct.byteLength);
      out.set(iv,0);out.set(ct,12);
      frame.data=out.buffer;
      controller.enqueue(frame);
    }catch{controller.enqueue(frame);}
  }
  async _sframeDecryptFrame(frame,controller) {
    if(!this._sframeKey){controller.enqueue(frame);return;}
    const data=new Uint8Array(frame.data);
    if(data.byteLength<28){controller.enqueue(frame);return;}
    const iv=data.slice(0,12),ct=data.slice(12);
    for(const key of [this._sframeKey,this._sframePrevKey]){
      if(!key) continue;
      try{frame.data=await crypto.subtle.decrypt({name:"AES-GCM",iv,additionalData:new Uint8Array(0)},key,ct);controller.enqueue(frame);return;}catch{}
    }
  }
  _sframeInstallSender(sender,state) {
    if(state.senders.has(sender)) return;
    if(this._sframeSupportMode==="encoded-streams"){
      const{readable,writable}=sender.createEncodedStreams();
      const t=new TransformStream({transform:(f,c)=>this._sframeEncryptFrame(f,c)});
      readable.pipeThrough(t).pipeTo(writable);
      state.senders.set(sender,t);
    } else {
      const t=new RTCRtpScriptTransform(this._sframeGetWorker(),{operation:"encrypt",id:crypto.randomUUID()});
      sender.transform=t;
      state.senders.set(sender,t);
    }
  }
  _sframeInstallReceiver(receiver,state) {
    if(state.receivers.has(receiver)) return;
    if(this._sframeSupportMode==="encoded-streams"){
      const{readable,writable}=receiver.createEncodedStreams();
      const t=new TransformStream({transform:(f,c)=>this._sframeDecryptFrame(f,c)});
      readable.pipeThrough(t).pipeTo(writable);
      state.receivers.set(receiver,t);
    } else {
      const t=new RTCRtpScriptTransform(this._sframeGetWorker(),{operation:"decrypt",id:crypto.randomUUID()});
      receiver.transform=t;
      state.receivers.set(receiver,t);
    }
  }
  _sframeGetWorker() {
    if(this._sframeWorker) return this._sframeWorker;
    const code=`self.onrtctransform=(event)=>{const{readable,writable}=event.transformer;const{operation}=event.transformer.options;let ck=null,pk=null,ctr=0;self.onmessage=async(e)=>{if(e.data.type==="key"){pk=ck;ck=await crypto.subtle.importKey("raw",e.data.key,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);ctr=0;if(pk)setTimeout(()=>{pk=null;},2000);}};const t=new TransformStream({async transform(frame,ctrl){if(!ck){ctrl.enqueue(frame);return;}if(operation==="encrypt"){try{const d=new Uint8Array(frame.data);const iv=new Uint8Array(12);crypto.getRandomValues(iv.subarray(0,8));new DataView(iv.buffer).setUint32(8,ctr++);const ct=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv,additionalData:new Uint8Array(0)},ck,d));const o=new Uint8Array(12+ct.byteLength);o.set(iv,0);o.set(ct,12);frame.data=o.buffer;}catch{}ctrl.enqueue(frame);}else{const d=new Uint8Array(frame.data);if(d.byteLength<28){ctrl.enqueue(frame);return;}const iv=d.slice(0,12),ct=d.slice(12);let ok=false;for(const k of[ck,pk]){if(!k)continue;try{frame.data=await crypto.subtle.decrypt({name:"AES-GCM",iv,additionalData:new Uint8Array(0)},k,ct);ok=true;break;}catch{}}if(ok)ctrl.enqueue(frame);}}});readable.pipeThrough(t).pipeTo(writable);};`;
    const blob=new Blob([code],{type:"application/javascript"});
    this._sframeWorker=new Worker(URL.createObjectURL(blob),{type:"module"});
    return this._sframeWorker;
  }
  _setupSFrame(pc) {
    if(!this.channelId||this._sframeIsSupported()==="none") return;
    const cid=this.channelId;
    this._sframeCrypto.deriveKeyBytes(cid).then(keyBytes=>{
      return this._sframeRotateKey(keyBytes).then(()=>{
        const state={pc,senders:new Map(),receivers:new Map(),trackListener:(e)=>{this._sframeInstallReceiver(e.receiver,state);}};
        for(const s of pc.getSenders()) if(s.track) this._sframeInstallSender(s,state);
        for(const r of pc.getReceivers()) this._sframeInstallReceiver(r,state);
        pc.addEventListener("track",state.trackListener);
        this._sframePCs.set(pc,state);
        this.sframeActive=true;
      });
    }).catch(err=>{console.error("[voice] SFrame setup failed:",err);this.sframeActive=false;});
  }
  _sframeCleanup() {
    for(const[pc,state]of this._sframePCs){
      pc.removeEventListener("track",state.trackListener);
      for(const[s]of state.senders) try{s.transform=null;}catch{}
      for(const[r]of state.receivers) try{r.transform=null;}catch{}
    }
    this._sframePCs.clear();
    if(this._sframeOverlapTimer){clearTimeout(this._sframeOverlapTimer);this._sframeOverlapTimer=null;}
    if(this._sframeWorker){this._sframeWorker.terminate();this._sframeWorker=null;}
    this._sframeKey=null;this._sframePrevKey=null;this._sframeCounter=0;this.sframeActive=false;this.peerKeyIds.clear();
  }
}

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState(""); const [password, setPassword] = useState(""); const [email, setEmail] = useState("");
  const [error, setError] = useState(""); const [loading, setLoading] = useState(false);
  const submit = async (e) => {
    e.preventDefault(); setError(""); setLoading(true);
    try { const res = mode==="login"?await api.login(username,password):await api.register(username,password,email); if(res.ok) onAuth(); else setError(res.data?.error?.message||`Error`); } catch { setError("Network error"); }

  };

    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>

        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:48, marginBottom:8 }}>🛡️</div>
          <h1 style={{ margin:0, color:T.tx, fontSize:26, fontWeight:700 }}>Discreet</h1>
          <p style={{ margin:"8px 0 0", color:T.mt, fontSize:13 }}>Zero-knowledge encrypted messaging</p>
        </div>
        <form onSubmit={submit}>
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.5px" }}>Username</label>
          <input style={{...getInp(),marginBottom:14}} value={username} onChange={e=>setUsername(e.target.value)} placeholder="alice" autoFocus />
          {mode==="register"&&(<><label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.5px" }}>Email (optional)</label><input style={{...getInp(),marginBottom:14}} value={email} onChange={e=>setEmail(e.target.value)} placeholder="alice@example.com" /></>)}
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.5px" }}>Password</label>
          <input style={{...getInp(),marginBottom:18}} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" />
          {error&&<div style={{ padding:"10px 14px", background:"rgba(255,71,87,0.08)", border:"1px solid rgba(255,71,87,0.2)", borderRadius:8, color:T.err, fontSize:13, marginBottom:14 }}>{error}</div>}
          <button type="submit" disabled={loading} style={btn(!loading)}>{loading?"...":mode==="login"?"Log In":"Create Account"}</button>
        </form>
        <div style={{ textAlign:"center", marginTop:18, fontSize:13, color:T.mt }}>{mode==="login"?"Need an account?":"Already have one?"} <span onClick={()=>{setMode(m=>m==="login"?"register":"login");setError("");}} style={{ color:T.ac, cursor:"pointer", fontWeight:600 }}>{mode==="login"?"Register":"Log In"}</span></div>
        <div style={{ marginTop:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <div style={{ flex:1, height:1, background:T.bd }} />
            <span style={{ fontSize:11, color:T.mt, textTransform:"uppercase", letterSpacing:"0.5px" }}>or</span>
            <div style={{ flex:1, height:1, background:T.bd }} />
          </div>
          <button onClick={async()=>{setLoading(true);setError("");try{const r=await api.registerGuest();if(r.ok)onAuth();else setError(r.data?.error?.message||"Error");}catch{setError("Network error");}setLoading(false);}} disabled={loading} style={{...btn(!loading),background:T.sf2,color:T.tx,border:`1px solid ${T.bd}`,width:"100%"}}>
            {loading?"...":"Join as Guest — No signup required"}
          </button>
          <div style={{ textAlign:"center", marginTop:8, fontSize:10, color:T.mt, lineHeight:1.5 }}>Guest accounts have full access. Upgrade anytime to save your identity.</div>
        </div>

        {/* Join Meeting by Code */}
        {React.createElement(function MeetingJoin() {
          const [meetCode, setMeetCode] = useState("");
          const [meetPw, setMeetPw] = useState("");
          const [meetInfo, setMeetInfo] = useState(null);
          const [meetErr, setMeetErr] = useState("");

          const lookupMeeting = async () => {
            if(meetCode.length<4) return;
            setMeetErr("");
            const info = await api.getMeeting(meetCode.trim());
            if(info && info.id) { setMeetInfo(info); }
            else { setMeetErr("Meeting not found or expired"); setMeetInfo(null); }
          };

          const joinAsMeeting = async () => {
            setMeetErr("");
            // Create guest account first, then join
            const gr = await api.registerGuest();
            if(!gr.ok) { setMeetErr(gr.data?.error?.message||"Failed to create guest account"); return; }
            onAuth(); // log in
            // Join meeting
            const jr = await api.joinMeeting(meetCode.trim(), meetPw||undefined);
            if(jr?.joined) { /* success — user is now in the app and meeting */ }
            else { setMeetErr(jr?.error?.message||"Could not join meeting"); }
          };

          return (
            <div style={{ marginTop:14 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <div style={{ flex:1, height:1, background:T.bd }} />
                <span style={{ fontSize:11, color:T.mt, textTransform:"uppercase", letterSpacing:"0.5px" }}>join a meeting</span>
                <div style={{ flex:1, height:1, background:T.bd }} />
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <input value={meetCode} onChange={e=>setMeetCode(e.target.value.replace(/\D/g,"").slice(0,6))} onKeyDown={e=>e.key==="Enter"&&lookupMeeting()} placeholder="6-digit code" maxLength={6}
                  style={{ flex:1, padding:"10px 14px", background:T.bg, border:`1px solid ${T.bd}`, borderRadius:8, color:T.tx, fontSize:18, fontFamily:"'JetBrains Mono',monospace", textAlign:"center", letterSpacing:"4px", outline:"none" }} />
                <button onClick={meetInfo?joinAsMeeting:lookupMeeting} disabled={meetCode.length<4||loading}
                  style={{...btn(meetCode.length>=4&&!loading), padding:"10px 18px", fontSize:13, whiteSpace:"nowrap"}}>
                  {meetInfo?"Join":"Find"}
                </button>
              </div>
              {meetInfo && (
                <div style={{ marginTop:8, padding:"8px 12px", background:T.sf2, borderRadius:8, border:`1px solid ${T.bd}` }}>
                  <div style={{ fontSize:13, fontWeight:700, color:T.tx }}>{meetInfo.title}</div>
                  <div style={{ fontSize:11, color:T.mt, marginTop:2 }}>{meetInfo.has_password?"🔒 Password required":"🔓 Open"} · {meetInfo.allow_guests?"Guests welcome":"Registered only"}</div>
                  {meetInfo.has_password && (
                    <input value={meetPw} onChange={e=>setMeetPw(e.target.value)} type="password" placeholder="Meeting password" style={{ width:"100%", marginTop:6, padding:"8px 10px", background:T.bg, border:`1px solid ${T.bd}`, borderRadius:6, color:T.tx, fontSize:13, boxSizing:"border-box" }} />
                  )}
                </div>
              )}
              {meetErr && <div style={{ marginTop:6, fontSize:11, color:T.err }}>{meetErr}</div>}
              <div style={{ fontSize:9, color:T.mt, marginTop:6, textAlign:"center" }}>Enter a meeting code to join an encrypted video call instantly. No account needed.</div>
            </div>
          );
        })}
        <div style={{ textAlign:"center", marginTop:20, padding:8, background:"rgba(0,212,170,0.04)", borderRadius:8, border:"1px solid rgba(0,212,170,0.1)", fontSize:11, color:T.ac, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}><I.Lock s={11} /> End-to-end encrypted · Zero-knowledge server</div>
      </div>
    </div>
  );
}

        case "angry": return `<path d="M${cx-32} ${by-4} L${cx-12} ${by+2}" stroke="#333" stroke-width="2.5" fill="none"/><path d="M${cx+12} ${by+2} L${cx+32} ${by-4}" stroke="#333" stroke-width="2.5" fill="none"/>`;
        case "raised": return `<path d="M${cx-32} ${by} Q${cx-22} ${by-10} ${cx-12} ${by}" stroke="#333" stroke-width="2.5" fill="none"/><path d="M${cx+12} ${by-4} Q${cx+22} ${by-14} ${cx+32} ${by-4}" stroke="#333" stroke-width="2.5" fill="none"/>`;
        case "thick": return `<path d="M${cx-34} ${by} Q${cx-22} ${by-8} ${cx-10} ${by}" stroke="#333" stroke-width="4" fill="none"/><path d="M${cx+10} ${by} Q${cx+22} ${by-8} ${cx+34} ${by}" stroke="#333" stroke-width="4" fill="none"/>`;
        case "none": return "";
        default: return "";
      }
    })();
    const mouth = (() => {
      const my = cy+18;
      switch(cfg.mouth) {
        case "smile": return `<path d="M${cx-15} ${my} Q${cx} ${my+15} ${cx+15} ${my}" stroke="#333" stroke-width="2.5" fill="none"/>`;
        case "grin": return `<path d="M${cx-18} ${my} Q${cx} ${my+18} ${cx+18} ${my}" stroke="#333" stroke-width="2" fill="white"/>`;
        case "neutral": return `<line x1="${cx-12}" y1="${my+3}" x2="${cx+12}" y2="${my+3}" stroke="#333" stroke-width="2.5"/>`;
        case "open": return `<ellipse cx="${cx}" cy="${my+5}" rx="12" ry="9" fill="#333"/><ellipse cx="${cx}" cy="${my+8}" rx="8" ry="4" fill="#c0392b"/>`;
        case "smirk": return `<path d="M${cx-10} ${my+3} Q${cx+5} ${my+12} ${cx+15} ${my}" stroke="#333" stroke-width="2.5" fill="none"/>`;
        case "tongue": return `<path d="M${cx-15} ${my} Q${cx} ${my+15} ${cx+15} ${my}" stroke="#333" stroke-width="2" fill="none"/><ellipse cx="${cx}" cy="${my+12}" rx="6" ry="8" fill="#e74c3c"/>`;
        default: return "";
      }
    })();
    const nose = (() => {
      const ny = cy+8;
      switch(cfg.nose) {
        case "small": return `<circle cx="${cx}" cy="${ny}" r="3" fill="${cfg.skin}" stroke="#00000022" stroke-width="1"/>`;
        case "pointed": return `<path d="M${cx} ${ny-5} L${cx+5} ${ny+4} L${cx-5} ${ny+4} Z" fill="${cfg.skin}" stroke="#00000022" stroke-width="1"/>`;
        case "wide": return `<ellipse cx="${cx}" cy="${ny+2}" rx="8" ry="4" fill="${cfg.skin}" stroke="#00000022" stroke-width="1"/>`;
        case "button": return `<circle cx="${cx}" cy="${ny}" r="5" fill="${cfg.skin}" stroke="#00000033" stroke-width="1.5"/>`;
        default: return "";
      }
    })();
    const glasses = (() => {
      const gy = cy-5;
      switch(cfg.glasses) {
        case "round": return `<circle cx="${cx-22}" cy="${gy}" r="14" fill="none" stroke="#333" stroke-width="2.5"/><circle cx="${cx+22}" cy="${gy}" r="14" fill="none" stroke="#333" stroke-width="2.5"/><line x1="${cx-8}" y1="${gy}" x2="${cx+8}" y2="${gy}" stroke="#333" stroke-width="2"/>`;
        case "square": return `<rect x="${cx-36}" y="${gy-10}" width="28" height="20" rx="3" fill="none" stroke="#333" stroke-width="2.5"/><rect x="${cx+8}" y="${gy-10}" width="28" height="20" rx="3" fill="none" stroke="#333" stroke-width="2.5"/><line x1="${cx-8}" y1="${gy}" x2="${cx+8}" y2="${gy}" stroke="#333" stroke-width="2"/>`;
        case "shades": return `<rect x="${cx-38}" y="${gy-11}" width="30" height="22" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/><rect x="${cx+8}" y="${gy-11}" width="30" height="22" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/><line x1="${cx-8}" y1="${gy}" x2="${cx+8}" y2="${gy}" stroke="#333" stroke-width="2"/>`;
        default: return "";
      }
    })();
    const hat = (() => {
      switch(cfg.hat) {
        case "beanie": return `<ellipse cx="${cx}" cy="${cy-55}" rx="60" ry="22" fill="${cfg.hair}"/><rect x="${cx-55}" y="${cy-65}" width="110" height="20" rx="10" fill="#e74c3c"/><circle cx="${cx}" cy="${cy-72}" r="6" fill="#e74c3c"/>`;
        case "cap": return `<path d="M${cx-55} ${cy-45} Q${cx} ${cy-80} ${cx+55} ${cy-45}" fill="#2c3e50"/><rect x="${cx-65}" y="${cy-48}" width="130" height="8" rx="4" fill="#2c3e50"/>`;
        case "tophat": return `<rect x="${cx-28}" y="${cy-100}" width="56" height="50" rx="4" fill="#1a1a1a"/><rect x="${cx-40}" y="${cy-55}" width="80" height="10" rx="5" fill="#1a1a1a"/><rect x="${cx-28}" y="${cy-60}" width="56" height="8" rx="3" fill="#8b0000"/>`;
        case "crown": return `<path d="M${cx-30} ${cy-55} L${cx-35} ${cy-80} L${cx-15} ${cy-65} L${cx} ${cy-85} L${cx+15} ${cy-65} L${cx+35} ${cy-80} L${cx+30} ${cy-55} Z" fill="#f1c40f" stroke="#d4a017" stroke-width="1.5"/>`;
        default: return "";
      }
    })();
    const beard = (() => {
      switch(cfg.beard) {
        case "stubble": return `<rect x="${cx-30}" y="${cy+15}" width="60" height="25" rx="15" fill="${cfg.hair}" opacity="0.3"/>`;
        case "goatee": return `<ellipse cx="${cx}" cy="${cy+30}" rx="15" ry="18" fill="${cfg.hair}" opacity="0.7"/>`;
        case "full": return `<ellipse cx="${cx}" cy="${cy+25}" rx="40" ry="30" fill="${cfg.hair}" opacity="0.6"/><ellipse cx="${cx}" cy="${cy+35}" rx="30" ry="25" fill="${cfg.hair}" opacity="0.7"/>`;
        case "mustache": return `<path d="M${cx-18} ${cy+14} Q${cx-10} ${cy+22} ${cx} ${cy+15} Q${cx+10} ${cy+22} ${cx+18} ${cy+14}" fill="${cfg.hair}" opacity="0.8"/>`;
        default: return "";
      }
    })();
    const shirt = `<path d="M${cx-55} ${faceH} Q${cx-40} ${cy+faceRy-15} ${cx} ${cy+faceRy+5} Q${cx+40} ${cy+faceRy-15} ${cx+55} ${faceH}" fill="${cfg.shirt}"/>`;
    const accessory = (() => {
      switch(cfg.accessory) {
        case "earring_l": return `<circle cx="${cx-faceR-2}" cy="${cy+5}" r="4" fill="#f1c40f" stroke="#d4a017" stroke-width="1"/>`;
        case "earrings": return `<circle cx="${cx-faceR-2}" cy="${cy+5}" r="4" fill="#f1c40f" stroke="#d4a017" stroke-width="1"/><circle cx="${cx+faceR+2}" cy="${cy+5}" r="4" fill="#f1c40f" stroke="#d4a017" stroke-width="1"/>`;
        case "scar": return `<path d="M${cx+10} ${cy-15} L${cx+20} ${cy+15}" stroke="#c0392b" stroke-width="2" opacity="0.5"/>`;
        case "blush": return `<ellipse cx="${cx-28}" cy="${cy+12}" rx="10" ry="6" fill="#ff6b6b" opacity="0.25"/><ellipse cx="${cx+28}" cy="${cy+12}" rx="10" ry="6" fill="#ff6b6b" opacity="0.25"/>`;
        case "freckles": return `<circle cx="${cx-20}" cy="${cy+8}" r="1.5" fill="#a0522d" opacity="0.4"/><circle cx="${cx-15}" cy="${cy+5}" r="1.5" fill="#a0522d" opacity="0.4"/><circle cx="${cx-25}" cy="${cy+5}" r="1.5" fill="#a0522d" opacity="0.4"/><circle cx="${cx+20}" cy="${cy+8}" r="1.5" fill="#a0522d" opacity="0.4"/><circle cx="${cx+15}" cy="${cy+5}" r="1.5" fill="#a0522d" opacity="0.4"/><circle cx="${cx+25}" cy="${cy+5}" r="1.5" fill="#a0522d" opacity="0.4"/>`;
        default: return "";
      }
    })();

    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${faceW} ${faceH}" width="${faceW}" height="${faceH}">
      <rect width="${faceW}" height="${faceH}" rx="20" fill="${cfg.bg}"/>
      ${shirt}
      <ellipse cx="${cx}" cy="${cy}" rx="${faceR}" ry="${faceRy}" fill="${cfg.skin}"/>
      ${beard}
      ${hair}
      ${brows}
      ${eyes}
      ${nose}
      ${mouth}
      ${glasses}
      ${hat}
      ${accessory}
    </svg>`;
  };

  const svgStr = renderSVG();
  const svgDataUrl = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgStr)));

  const handleSave = () => {
    // Convert SVG to PNG via canvas for wider compatibility
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas"); c.width=200; c.height=200;
      const ctx = c.getContext("2d"); ctx.drawImage(img,0,0,200,200);
      const png = c.toDataURL("image/png");
      onSave(png);
    };
    img.src = svgDataUrl;
  };

  const randomize = () => {
    const pick = arr => arr[Math.floor(Math.random()*arr.length)];
    setCfg({
      bg: pick(BGS), skin: pick(SKINS), hair: pick(HAIRS),
      hairStyle: pick(["short","medium","long","mohawk","curly","buzz","bald","ponytail","pigtails"]),
      eyes: pick(["round","narrow","big","wink","sleepy"]),
      eyeColor: pick(["#3b5998","#2ecc71","#8b4513","#1a1a1a","#2d3436","#6c5ce7","#00b894"]),
      mouth: pick(["smile","grin","neutral","open","smirk","tongue"]),
      nose: pick(["small","pointed","wide","button"]),
      brows: pick(["normal","angry","raised","thick","none"]),
      glasses: pick(["none","none","none","round","square","shades"]),
      hat: pick(["none","none","none","none","beanie","cap","tophat","crown"]),
      beard: pick(["none","none","none","stubble","goatee","full","mustache"]),
      shirt: pick(SHIRTS), accessory: pick(["none","none","earring_l","earrings","scar","blush","freckles"]),
      faceShape: pick(["round","oval","square","long"]),
    });
  };

  const OptRow = ({label, value, options, onChange}) => (
    <div style={{ marginBottom:6 }}>
      <div style={{ fontSize:10, fontWeight:700, color:T.mt, textTransform:"uppercase", marginBottom:3 }}>{label}</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
        {options.map(o => {
          const v = typeof o === "object" ? o.value : o;
          const lbl = typeof o === "object" ? o.label : o;
          return <div key={v} onClick={()=>onChange(v)} style={{ padding:"3px 8px", borderRadius:5, fontSize:10, cursor:"pointer", background:value===v?T.ac+"33":"rgba(255,255,255,0.05)", color:value===v?T.ac:T.mt, border:`1px solid ${value===v?T.ac+"55":T.bd}`, textTransform:"capitalize", fontWeight:value===v?700:400 }}>{lbl}</div>;
        })}
      </div>
    </div>
  );

  const ColorRow = ({label, value, colors, onChange}) => (
    <div style={{ marginBottom:6 }}>
      <div style={{ fontSize:10, fontWeight:700, color:T.mt, textTransform:"uppercase", marginBottom:3 }}>{label}</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
        {colors.map(c => <div key={c} onClick={()=>onChange(c)} style={{ width:20, height:20, borderRadius:10, background:c, cursor:"pointer", border:value===c?`2px solid ${T.ac}`:"2px solid transparent", boxSizing:"border-box" }} />)}
      </div>
    </div>
  );

  return (
    <Modal title="🎨 Create Your Avatar" onClose={onClose} wide>
      <div style={{ display:"flex", gap:16 }}>
        {/* Preview */}
        <div style={{ flexShrink:0, display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
          <div style={{ width:160, height:160, borderRadius:16, overflow:"hidden", border:`2px solid ${T.bd}`, boxShadow:"0 4px 20px rgba(0,0,0,0.3)" }} dangerouslySetInnerHTML={{__html:svgStr}} />
          <button onClick={randomize} className="pill-btn" style={{ background:"rgba(255,255,255,0.08)", color:T.ac, border:`1px solid ${T.bd}`, padding:"6px 14px", fontSize:11, display:"flex", alignItems:"center", gap:4 }}>🎲 Randomize</button>
        </div>
        {/* Controls */}
        <div style={{ flex:1, overflowY:"auto", maxHeight:380, paddingRight:4 }}>
          <ColorRow label="Background" value={cfg.bg} colors={BGS} onChange={v=>set("bg",v)} />
          <ColorRow label="Skin Tone" value={cfg.skin} colors={SKINS} onChange={v=>set("skin",v)} />
          <OptRow label="Face Shape" value={cfg.faceShape} options={["round","oval","square","long"]} onChange={v=>set("faceShape",v)} />
          <OptRow label="Hair Style" value={cfg.hairStyle} options={["bald","buzz","short","medium","long","curly","mohawk","ponytail","pigtails"]} onChange={v=>set("hairStyle",v)} />
          <ColorRow label="Hair Color" value={cfg.hair} colors={HAIRS} onChange={v=>set("hair",v)} />
          <OptRow label="Eyes" value={cfg.eyes} options={["round","narrow","big","wink","sleepy"]} onChange={v=>set("eyes",v)} />
          <ColorRow label="Eye Color" value={cfg.eyeColor} colors={["#3b5998","#2ecc71","#8b4513","#1a1a1a","#2d3436","#6c5ce7","#00b894"]} onChange={v=>set("eyeColor",v)} />
          <OptRow label="Eyebrows" value={cfg.brows} options={["none","normal","angry","raised","thick"]} onChange={v=>set("brows",v)} />
          <OptRow label="Nose" value={cfg.nose} options={["small","pointed","wide","button"]} onChange={v=>set("nose",v)} />
          <OptRow label="Mouth" value={cfg.mouth} options={["smile","grin","neutral","open","smirk","tongue"]} onChange={v=>set("mouth",v)} />
          <OptRow label="Beard" value={cfg.beard} options={["none","stubble","goatee","full","mustache"]} onChange={v=>set("beard",v)} />
          <OptRow label="Glasses" value={cfg.glasses} options={["none","round","square","shades"]} onChange={v=>set("glasses",v)} />
          <OptRow label="Hat" value={cfg.hat} options={["none","beanie","cap","tophat","crown"]} onChange={v=>set("hat",v)} />
          <ColorRow label="Shirt Color" value={cfg.shirt} colors={SHIRTS} onChange={v=>set("shirt",v)} />
          <OptRow label="Extra" value={cfg.accessory} options={[{value:"none",label:"None"},{value:"earring_l",label:"Earring"},{value:"earrings",label:"Both Earrings"},{value:"blush",label:"Blush"},{value:"freckles",label:"Freckles"},{value:"scar",label:"Scar"}]} onChange={v=>set("accessory",v)} />
        </div>
      </div>
      <div style={{ marginTop:12, display:"flex", gap:8 }}>
        <button onClick={handleSave} style={{ flex:1, padding:"10px 0", background:T.ac, color:"#000", border:"none", borderRadius:8, fontWeight:700, fontSize:14, cursor:"pointer" }}>Save as Avatar</button>
        <button onClick={onClose} className="pill-btn" style={{ background:T.sf2, color:T.mt, border:`1px solid ${T.bd}`, padding:"10px 20px", fontSize:13 }}>Cancel</button>
      </div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════
// Bot Configuration Modal — comprehensive bot settings
// ═══════════════════════════════════════════════════════════
function BotConfigModal({ bot, serverId, onClose, onSave }) {
  const [tab, setTab] = useState("general");
  const [cfg, setCfg] = useState({
    display_name: bot?.display_name || bot?.username || "Bot",
    persona: bot?.persona || "general",
    system_prompt: bot?.system_prompt || "",
    description: bot?.description || "",
    voice_style: bot?.voice_style || "default",
    temperature: bot?.temperature ?? 0.7,
    max_tokens: bot?.max_tokens ?? 1000,
    response_mode: bot?.response_mode || "auto", // auto | mention_only | off
    dm_auto_respond: bot?.dm_auto_respond !== false, // always true by default in DMs
    greeting_message: bot?.greeting_message || "",
    blocked_topics: bot?.blocked_topics || "",
    response_prefix: bot?.response_prefix || "",
    rate_limit_per_min: bot?.rate_limit_per_min ?? 20,
    persistent: bot?.persistent !== false,
    enabled: bot?.enabled !== false,
    typing_delay: bot?.typing_delay ?? 800, // ms of simulated typing before response
    context_memory: bot?.context_memory !== false, // remember conversation context
    context_window: bot?.context_window ?? 20, // number of messages to remember
    auto_thread: bot?.auto_thread ?? false, // auto-create threads for long conversations
    dm_greeting: bot?.dm_greeting || "Hey! I'm here to help. Ask me anything.",
    emoji_reactions: bot?.emoji_reactions !== false, // react to messages with emojis
    language: bot?.language || "auto", // response language
    knowledge_base: bot?.knowledge_base || "", // custom FAQ/knowledge
  });
  const set = (k, v) => setCfg(p => ({ ...p, [k]: v }));

  const save = async () => {
    if (serverId && bot?.bot_user_id) {
      await api.updateBotConfig(serverId, bot.bot_user_id, cfg);
    }
    onSave && onSave(cfg);
    onClose();
  };

  const tabs = ["general","behavior","personality","limits","advanced"];

  return (
    <Modal title={`🤖 Configure: ${cfg.display_name}`} onClose={onClose} wide>
      <div style={{ display:"flex", gap:2, marginBottom:16, borderBottom:`1px solid ${T.bd}`, paddingBottom:8 }}>
        {tabs.map(t => (
          <div key={t} onClick={() => setTab(t)} style={{ padding:"6px 12px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:tab===t?700:400, color:tab===t?T.ac:T.mt, background:tab===t?`${T.ac}11`:"transparent", textTransform:"capitalize" }}>{t}</div>
        ))}
      </div>

      {tab === "general" && (<>
        <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:4, textTransform:"uppercase" }}>Display Name</label>
        <input value={cfg.display_name} onChange={e=>set("display_name",e.target.value)} style={{...getInp(),marginBottom:12}} />

        <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:4, textTransform:"uppercase" }}>Description</label>
        <input value={cfg.description} onChange={e=>set("description",e.target.value)} placeholder="What does this bot do?" style={{...getInp(),marginBottom:12}} />

        <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:4, textTransform:"uppercase" }}>Persona</label>
        <select value={cfg.persona} onChange={e=>set("persona",e.target.value)} style={{ width:"100%", padding:"8px 12px", background:T.bg, border:`1px solid ${T.bd}`, borderRadius:8, color:T.tx, fontSize:13, marginBottom:12 }}>
          {["general","legal","medical","security","gaming","music","art","research","coding","companion","creative","meme","finance","fitness"].map(p=>
            <option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>
          )}
        </select>

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0" }}>
          <div><div style={{ fontSize:12, fontWeight:600 }}>Enabled</div><div style={{ fontSize:10, color:T.mt }}>Bot is active and can respond</div></div>
          <div onClick={()=>set("enabled",!cfg.enabled)} style={{ width:36, height:20, borderRadius:10, background:cfg.enabled?T.ac:"#555", cursor:"pointer", position:"relative" }}>
            <div style={{ width:16, height:16, borderRadius:8, background:"#fff", position:"absolute", top:2, left:cfg.enabled?18:2, transition:"left .2s" }} />
          </div>
        </div>
      </>)}

      {tab === "behavior" && (<>
        <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:4, textTransform:"uppercase" }}>Response Mode (in channels)</label>
        <select value={cfg.response_mode} onChange={e=>set("response_mode",e.target.value)} style={{ width:"100%", padding:"8px 12px", background:T.bg, border:`1px solid ${T.bd}`, borderRadius:8, color:T.tx, fontSize:13, marginBottom:12 }}>
          <option value="auto">Auto-respond to all messages in channel</option>
          <option value="mention_only">Respond only when @mentioned</option>
          <option value="off">Silent (no auto-responses, only slash commands)</option>
        </select>

        <div style={{ padding:"8px 12px", background:`${T.ac}11`, borderRadius:6, marginBottom:12, fontSize:11, color:T.ac }}>
          In DMs: bots ALWAYS auto-respond (users are talking directly to the bot)
        </div>

        <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:4, textTransform:"uppercase" }}>Greeting Message</label>
        <textarea value={cfg.greeting_message} onChange={e=>set("greeting_message",e.target.value)} placeholder="Message sent when bot first joins or user starts a conversation..." rows={2} style={{ width:"100%", padding:"8px 10px", background:T.bg, border:`1px solid ${T.bd}`, borderRadius:8, color:T.tx, fontSize:12, resize:"vertical", marginBottom:12, fontFamily:"inherit", boxSizing:"border-box" }} />

        <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:4, textTransform:"uppercase" }}>Response Prefix</label>
        <input value={cfg.response_prefix} onChange={e=>set("response_prefix",e.target.value)} placeholder="e.g. '[Game Master]' or leave empty" style={{...getInp(),marginBottom:12}} />

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0" }}>
          <div><div style={{ fontSize:12, fontWeight:600 }}>Persistent</div><div style={{ fontSize:10, color:T.mt }}>Bot stays in channel (vs temporary visit)</div></div>
          <div onClick={()=>set("persistent",!cfg.persistent)} style={{ width:36, height:20, borderRadius:10, background:cfg.persistent?T.ac:"#555", cursor:"pointer", position:"relative" }}>
            <div style={{ width:16, height:16, borderRadius:8, background:"#fff", position:"absolute", top:2, left:cfg.persistent?18:2, transition:"left .2s" }} />
          </div>
        </div>

        <div style={{ marginTop:8, borderTop:`1px solid ${T.bd}`, paddingTop:12 }}>
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:T.mt, marginBottom:4, textTransform:"uppercase" }}>Typing Delay ({cfg.typing_delay}ms)</label>
          <div style={{ fontSize:10, color:T.mt, marginBottom:4 }}>Simulated typing time before bot responds. Makes it feel more natural.</div>
          <input type="range" min="0" max="3000" step="100" value={cfg.typing_delay} onChange={e=>set("typing_delay",parseInt(e.target.value))} style={{ width:"100%", accentColor:T.ac, marginBottom:4 }} />
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:T.mt }}><span>Instant</span><span>{cfg.typing_delay}ms</span><span>3s</span></div>
        </div>

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0", marginTop:4 }}>
          <div><div style={{ fontSize:12, fontWeight:600 }}>Context Memory</div><div style={{ fontSize:10, color:T.mt }}>Bot remembers previous messages in conversation</div></div>
          <div onClick={()=>set("context_memory",!cfg.context_memory)} style={{ width:36, height:20, borderRadius:10, background:cfg.context_memory?T.ac:"#555", cursor:"pointer", position:"relative" }}>
            <div style={{ width:16, height:16, borderRadius:8, background:"#fff", position:"absolute", top:2, left:cfg.context_memory?18:2, transition:"left .2s" }} />
          </div>
        </div>
        {cfg.context_memory && (
          <div style={{ paddingLeft:12, marginBottom:8 }}>
            <label style={{ fontSize:10, fontWeight:600, color:T.mt }}>Context Window (messages to remember)</label>

// Confirm Dialog — styled replacement for browser confirm()
// ═══════════════════════════════════════════════════════════
function ConfirmDialog({ dialog, setDialog }) {
  if (!dialog?.open) return null;
  const [dontShow, setDontShow] = useState(false);
  const resolve = (val) => {
    if (val && dontShow && dialog.dismissKey) {
      localStorage.setItem("d_dismiss_"+dialog.dismissKey, "true");
    }
    _confirmResolve?.(val);
    _confirmResolve = null;
    setDialog(null);
  };
  useEffect(() => {
    const k = (e) => { if(e.key==="Escape") resolve(false); if(e.key==="Enter") resolve(true); };
    document.addEventListener("keydown", k);
    return () => document.removeEventListener("keydown", k);
  }, []);
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:10010 }} onClick={()=>resolve(false)}>
      <div onClick={e=>e.stopPropagation()} style={{ width:400, maxWidth:"90vw", background:T.sf, borderRadius:12, border:`1px solid ${T.bd}`, overflow:"hidden", boxShadow:"0 16px 48px rgba(0,0,0,0.5)" }}>
        <div style={{ padding:"20px 24px 12px" }}>
          <div style={{ fontSize:18, fontWeight:700, color:dialog.danger?"#ff4757":T.tx, marginBottom:8 }}>{dialog.title}</div>
          <div style={{ fontSize:14, color:T.mt, lineHeight:1.5, whiteSpace:"pre-wrap" }}>{dialog.message}</div>
        </div>
        {dialog.dismissKey && (
          <div style={{ padding:"0 24px 8px" }}>
            <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:12, color:T.mt }}>
              <input type="checkbox" checked={dontShow} onChange={e=>setDontShow(e.target.checked)} style={{ accentColor:T.ac }} />
              Don't show this again
            </label>
          </div>
        )}
        <div style={{ display:"flex", justifyContent:"flex-end", gap:10, padding:"12px 24px 20px", background:T.bg }}>
          <button onClick={()=>resolve(false)} className="pill-btn" style={{ background:T.sf2, color:T.mt, padding:"8px 20px", fontSize:13 }}>Cancel</button>
          <button onClick={()=>resolve(true)} className="pill-btn" style={{
            background:dialog.danger?"#ff4757":`linear-gradient(135deg,${T.ac},${T.ac2})`,
            color:dialog.danger?"#fff":"#000", padding:"8px 20px", fontSize:13, fontWeight:700
          }}>{dialog.danger?"Delete":"Confirm"}</button>
        </div>
      </div>
    </div>
  );
}
