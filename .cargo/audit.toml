# Only unmaintained warnings and pre-upgrade crypto dependencies are documented here.
# Crypto CVEs will be fully resolved by OpenMLS 0.8 upgrade before production launch.

[advisories]
ignore = [
    # paste is unmaintained but has no CVE — transitive from sqlx-core
    "RUSTSEC-2024-0436",
    # rustls-pemfile is unmaintained but has no CVE — transitive from sqlx-core and reqwest
    "RUSTSEC-2025-0134",
    # curve25519-dalek timing — pinned by openmls 0.5, will be resolved by openmls 0.8 upgrade before launch
    "RUSTSEC-2024-0344",
    # ed25519-dalek oracle — pinned by openmls 0.5, will be resolved by openmls 0.8 upgrade before launch
    "RUSTSEC-2022-0093",
]
