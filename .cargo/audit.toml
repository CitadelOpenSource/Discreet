# Crypto CVEs resolved by OpenMLS 0.8.1 upgrade (curve25519-dalek, ed25519-dalek).
# All remaining exceptions are unmaintained advisories or unreachable code paths.
# Each entry documents: what, why it's here, impact, and when to re-evaluate.

[advisories]
ignore = [
    # vodozemac unmaintained advisory — transitive dep from openmls.
    # No CVE, no security impact. Monitoring for replacement.
    "RUSTSEC-2024-0436",
    # rustls-pemfile unmaintained — transitive from sqlx-core and reqwest.
    # No CVE filed. PEM parsing only used at startup for TLS cert loading.
    # Monitoring for fork or replacement.
    "RUSTSEC-2025-0134",
    # rsa pulled transitively via sqlx-mysql compile-time dep.
    # We use PostgreSQL only. RSA code never executes. No upstream fix.
    # Re-evaluate when rsa ships constant-time release.
    "RUSTSEC-2023-0071",
]
