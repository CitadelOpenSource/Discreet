# docker-compose.prod.yml — Production deployment (Oracle Cloud / any VPS)
#
# Usage:
#   1. Generate SQLx offline metadata locally:
#      cargo sqlx prepare
#   2. Export required secrets:
#      export POSTGRES_PASSWORD=$(openssl rand -hex 32)
#      export JWT_SECRET=$(openssl rand -hex 64)
#      export CORS_ORIGINS=https://yourdomain.com
#   3. Build and start:
#      docker compose -f docker-compose.prod.yml up -d --build
#   4. Apply migrations (first time only):
#      docker compose -f docker-compose.prod.yml exec server /migrate.sh
#
# All three env vars (POSTGRES_PASSWORD, JWT_SECRET, CORS_ORIGINS) are required.
# Docker Compose will abort with a clear error if any is missing.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: citadel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — generate with: openssl rand -hex 32}
      POSTGRES_DB: citadel
    volumes:
      - citadel_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citadel -d citadel"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - citadel_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://citadel:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/citadel
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — generate with: openssl rand -hex 64}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required — set to your domain e.g. https://yourdomain.com}
      AGENTS_ENABLED: "true"
      PQ_ENABLED: "false"
      FEDERATION_ENABLED: "false"
      RATE_LIMIT_PER_MINUTE: "120"
    ports:
      - "3000:3000"
    volumes:
      - ./migrations:/migrations:ro
      - ./client:/client:ro
    restart: unless-stopped

  # Caddy reverse proxy for automatic HTTPS (Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    restart: unless-stopped

volumes:
  citadel_pg:
  citadel_redis:
  caddy_data:
  caddy_config:
